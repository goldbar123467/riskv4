function loadGameFromSidebar() {
  if (!SaveLoad.has()) { toast("No saved game found."); return; }
  const ok = window.confirm("Load saved game? Current progress will be lost.");
  if (!ok) return;
  loadSavedGame();
}

function startGame() {
  const count = parseInt(document.getElementById("player-count").value, 10);
  const nameInputs = document.querySelectorAll(".p-name");
  const roleInputs = document.querySelectorAll(".p-role");
  const archInputs = document.querySelectorAll(".p-arch");
  const classicMode = document.getElementById("classic-mode")?.checked || false;
  const players = [];
  for (let i = 0; i < count; i++) {
    const isAI = roleInputs[i].value === "ai";
    players.push({
      id: i,
      name: nameInputs[i].value.trim() || `Player ${i+1}`,
      color: PALETTE[i].color,
      isAI,
      archId: (isAI && !classicMode && archInputs[i]) ? (archInputs[i].value || null) : null,
      armies: STARTING_ARMIES[count],
      cards: [],
      eliminated: false,
      // === MARKER: player-extensions ===
      personality: null,
      runtimeWeights: null,
      runtimeTemperature: 1.0,
      regretTempAccum: 0,
      mood: "neutral",
      grudges: {},
      goal: null,
      goalProgress: 0,
      currentPlan: null,
      openingBook: null,
      ruleMods: {},
    });
  }
  state = freshState();
  state.players = shuffle(players); // randomize turn order
  state.players.forEach((p, i) => { p.id = i; });
  // Attach personalities via Persona
  state.players.forEach(p => Persona.attach(p, p.archId));

  // Territories init
  for (const name of TERR_ORDER) {
    const [cont, x, y, adj] = TERR_DATA[name];
    state.territories[name] = { owner: null, armies: 0, continent: cont, x, y, adj };
  }
  // Deck
  state.deck = shuffle(buildDeck());

  // Distribute territories — use book-weighted draft if any AI has a book
  const hasBooks = state.players.some(p => p.personality?.openingBook);
  if (hasBooks) {
    const unclaimed = new Set(TERR_ORDER);
    let turn = 0;
    while (unclaimed.size > 0) {
      const p = state.players[turn % state.players.length];
      const candidates = [...unclaimed];
      let best = { name: candidates[0], score: -Infinity };
      for (const nm of candidates) {
        const score = (p.personality ? Book.claimScore(p, nm) : 0) + Math.random() * 5;
        if (score > best.score) best = { name: nm, score };
      }
      state.territories[best.name].owner = p.id;
      state.territories[best.name].armies = 1;
      p.armies -= 1;
      unclaimed.delete(best.name);
      turn++;
    }
  } else {
    const order = shuffle(TERR_ORDER);
    order.forEach((name, i) => {
      const pIdx = i % state.players.length;
      const player = state.players[pIdx];
      state.territories[name].owner = player.id;
      state.territories[name].armies = 1;
      player.armies -= 1;
    });
  }

  log(`A new war begins. ${state.players.map(p => p.name).join(" → ")} take turns.`);
  state.phase = "setup-reinforce";
  state.currentPlayerIdx = 0;
  document.getElementById("setup-overlay").classList.add("hidden");
  render();
  // === MARKER: hook-game-start ===
  Hooks.emit("gameStart", { players: state.players });
  scheduleIfAI();
}

/* =========================================================================
   TERRITORY CLICK HANDLING
   ========================================================================= */

function onTerritoryClick(name) {
  const cp = currentPlayer();
  if (!cp || cp.isAI) return;
  const t = state.territories[name];
  if (state.phase === "setup-reinforce") {
    if (t.owner !== cp.id) { toast("Deploy only on your territories."); return; }
    t.armies += 1;
    cp.armies -= 1;
    log(`${cp.name} deploys 1 army to ${name}.`);
    animateCount(name);
    advanceSetupReinforce();
    render();
    return;
  }
  if (state.phase === "reinforce") {
    if (t.owner !== cp.id) { toast("You don't control that territory."); return; }
    if (state.pendingReinforcements <= 0) { toast("No more armies to place."); return; }
    t.armies += 1;
    state.pendingReinforcements -= 1;
    animateCount(name);
    render();
    // If this was mid-attack forced-trade placement, resume the attack flow
    if (state.midAttackPlacement && state.pendingReinforcements === 0 && midAttackResume) {
      const fn = midAttackResume;
      midAttackResume = null;
      fn();
    }
    return;
  }
  if (state.phase === "attack") {
    if (!state.selected.source) {
      if (t.owner !== cp.id) { toast("Select one of your territories first."); return; }
      if (t.armies < 2) { toast("Need at least 2 armies to attack."); return; }
      state.selected.source = name;
      render();
      return;
    }
    // have source; click target or change source
    if (t.owner === cp.id) {
      if (t.armies < 2) { toast("Need at least 2 armies to attack."); return; }
      state.selected.source = name;
      state.selected.target = null;
      render();
      return;
    }
    // enemy territory: must be adjacent to source
    if (!state.territories[state.selected.source].adj.includes(name)) {
      toast("Not adjacent to your selected territory.");
      return;
    }
    state.selected.target = name;
    render();
    return;
  }
  if (state.phase === "fortify") {
    if (!state.selected.source) {
      if (t.owner !== cp.id) { toast("Select one of your territories first."); return; }
      if (t.armies < 2) { toast("Need 2+ armies to move from there."); return; }
      state.selected.source = name;
      render();
      return;
    }
    if (t.owner === cp.id && name !== state.selected.source) {
      if (!state.territories[state.selected.source].adj.includes(name)) {
        // allow re-selecting source
        if (t.armies >= 2) {
          state.selected.source = name; state.selected.target = null;
          render(); return;
        }
        toast("Destination must be adjacent.");
        return;
      }
      state.selected.target = name;
      render();
      return;
    }
    toast("Destination must be one of your adjacent territories.");
    return;
  }
}

/* =========================================================================
   ANIMATIONS
   ========================================================================= */

function animateCount(name) {
  // Simple pulse via transient scale — the render already shows the new number;
  // we briefly apply source-glow class, then remove it.
  setTimeout(() => {
    const g = document.querySelector(`.node-group[data-name="${CSS.escape(name)}"]`);
    if (!g) return;
    g.classList.add("selected");
    setTimeout(() => g.classList.remove("selected"), 220);
  }, 10);
}

/* =========================================================================
   SETUP PHASE: cycling reinforcement
   ========================================================================= */

function advanceSetupReinforce() {
  // advance to next player that still has armies
  const n = state.players.length;
  for (let step = 1; step <= n; step++) {
    const idx = (state.currentPlayerIdx + step) % n;
    if (state.players[idx].armies > 0) {
      state.currentPlayerIdx = idx;
      scheduleIfAI();
      return;
    }
  }
  // Nobody has armies — start real game
  state.currentPlayerIdx = 0;
  state.phase = "reinforce";
  beginReinforcePhase();
}

function beginReinforcePhase() {
  const cp = currentPlayer();
  if (cp.eliminated) { advanceTurn(); return; }
  state.pendingReinforcements = calcReinforcements(cp.id);
  state.conqueredThisTurn = false;
  state.fortifyUsed = false;
  state.selected = { source: null, target: null };
  state.selectedCards = [];
  // === MARKER: hook-turn-start ===
  Hooks.emit("turnStart", { player: cp, turn: state.turn });
  log(`— ${cp.name}'s turn ${state.turn} begins. Reinforcements: ${state.pendingReinforcements}.`);
  render();
  // Mandatory trade check
  if (cp.cards.length >= 5) {
    if (cp.isAI) {
      aiForceTrade(cp, /*duringAttack*/ false);
    } else {
      openHumanForcedTradeModal();
    }
    return;
  }
  scheduleIfAI();
}

/* =========================================================================
   CARD TRADING (HUMAN)
   ========================================================================= */

function onHumanTrade() {
  const cp = currentPlayer();
  const indices = state.selectedCards.slice().sort((a,b)=>b-a);
  const trio = indices.map(i => cp.cards[i]);
  if (!validSet(trio)) { toast("Not a valid set."); return; }
  executeTrade(cp, indices);
  state.selectedCards = [];
  render();
  if (cp.cards.length >= 5) {
    openHumanForcedTradeModal();
  }
}

function executeTrade(player, indices) {
  // indices must be sorted desc
  const sorted = indices.slice().sort((a,b)=>b-a);
  const trio = sorted.map(i => player.cards[i]);
  const value = nextTradeValue(state.setsTradedGlobal);
  state.setsTradedGlobal += 1;
  // Remove cards from hand + move to discard
  sorted.forEach(i => {
    state.discard.push(player.cards[i]);
    player.cards.splice(i, 1);
  });
  // bonus armies
  state.pendingReinforcements += value;
  if (player.personality) flog("trade", { value }, player);
  else log(`${player.name} trades a set for <b>+${value}</b> armies (total ${state.setsTradedGlobal} sets traded).`);
  // +2 for each matching owned territory — classic Risk only gives +2 on one matched
  // Rule from prompt: "When a player trades in a card whose territory they currently own, place +2 armies directly on that territory"
  for (const card of trio) {
    if (!card.territory) continue;
    const terr = state.territories[card.territory];
    if (terr.owner === player.id) {
      terr.armies += 2;
      log(`+2 armies placed on ${card.territory} (matched card).`);
    }
  }
}

function discardCards(player, indices) {
  const sorted = indices.slice().sort((a,b)=>b-a);
  sorted.forEach(i => {
    state.discard.push(player.cards[i]);
    player.cards.splice(i, 1);
  });
  log(`${player.name} discards ${sorted.length} card(s).`);
}

function openHumanForcedTradeModal() {
  const cp = currentPlayer();
  if (cp.cards.length < 5) return;
  // For human we show a modal asking them to select + trade until < 5.
  const root = document.getElementById("modal-root");
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <h2>Mandatory Trade</h2>
    <div class="subtext">You hold ${cp.cards.length} cards. You must trade sets down to 4 or fewer before continuing. If you can't form a valid set, select one card and discard it.</div>
    <div class="card-list" id="forced-card-list"></div>
    <div class="modal-buttons">
      <button class="btn" id="forced-trade-btn" disabled>Trade Selected</button>
      <button class="btn" id="forced-discard-btn" disabled>Discard Card</button>
    </div>
  `;
  backdrop.appendChild(m);
  root.appendChild(backdrop);
  const selected = new Set();
  function refresh() {
    const list = m.querySelector("#forced-card-list");
    list.innerHTML = "";
    cp.cards.forEach((c, i) => {
      const matches = c.territory && state.territories[c.territory].owner === cp.id;
      const cls = ["card-chip"];
      if (c.type === "Wild") cls.push("wild");
      if (selected.has(i)) cls.push("selected");
      if (matches) cls.push("match");
      const span = document.createElement("span");
      span.className = cls.join(" ");
      span.textContent = c.type === "Wild" ? "✦ Wild" : (c.type[0] + " · " + c.territory);
      span.addEventListener("click", () => {
        if (selected.has(i)) selected.delete(i);
        else if (selected.size < 3) selected.add(i);
        refresh();
      });
      list.appendChild(span);
    });
    const trio = Array.from(selected).map(i => cp.cards[i]);
    m.querySelector("#forced-trade-btn").disabled = !(trio.length === 3 && validSet(trio));
    m.querySelector("#forced-discard-btn").disabled = selected.size !== 1;
  }
  refresh();
  m.querySelector("#forced-trade-btn").addEventListener("click", () => {
    const idxs = Array.from(selected).sort((a,b)=>b-a);
    executeTrade(cp, idxs);
    backdrop.remove();
    render();
    if (cp.cards.length >= 5) openHumanForcedTradeModal();
  });
  m.querySelector("#forced-discard-btn").addEventListener("click", () => {
    const idxs = Array.from(selected).sort((a,b)=>b-a);
    discardCards(cp, idxs);
    backdrop.remove();
    render();
    if (cp.cards.length >= 5) openHumanForcedTradeModal();
  });
}

/* =========================================================================
   COMBAT
   ========================================================================= */

function humanAttack(blitz) {
  const src = state.selected.source;
  const tgt = state.selected.target;
  if (!src || !tgt) { toast("Pick source and target."); return; }
  if (blitz) {
    runBlitz(src, tgt, () => { render(); });
  } else {
    runOneRoll(src, tgt, () => { render(); });
  }
}

// Resolves one combat round. After animation, invokes callback.
function runOneRoll(srcName, tgtName, cb) {
  const src = state.territories[srcName];
  const tgt = state.territories[tgtName];
  if (src.armies < 2) { toast("Source can't attack (1 army)."); cb && cb(); return; }
  const cp = currentPlayer();
  const atkCount = Math.min(3, src.armies - 1);
  const defCount = Math.min(2, tgt.armies);
  let atkDice = Array.from({length: atkCount}, rollDie).sort((a,b)=>b-a);
  const defDice = Array.from({length: defCount}, rollDie).sort((a,b)=>b-a);
  // Prophet reroll (Rule.rerollAtkDie)
  atkDice = Rule.rerollAtkDie(cp, atkDice, defDice);
  let atkL = 0, defL = 0;
  const comparisons = Math.min(atkDice.length, defDice.length);
  for (let i = 0; i < comparisons; i++) {
    if (atkDice[i] > defDice[i]) defL++;
    else atkL++;
  }
  src.armies -= atkL;
  tgt.armies -= defL;
  const defenderPlayer = playerById(tgt.owner);
  // Render dice with animation in sidebar
  showDiceInSidebar(atkDice, defDice);
  pulseAttackLine(srcName, tgtName);
  if (typeof buzz === "function") buzz(15);

  let resultMsg = `${srcName} attacks ${tgtName}: atk [${atkDice.join(",")}] vs def [${defDice.join(",")}] → atk loses ${atkL}, def loses ${defL}.`;
  if (tgt.armies <= 0) {
    resultMsg += ` <b>${tgtName} captured!</b>`;
  }
  log(resultMsg);
  // === MARKER: hook-attack ===
  Hooks.emit("attack", {
    source: srcName, target: tgtName,
    atkDice, defDice, atkLost: atkL, defLost: defL,
    captured: tgt.armies <= 0,
    attacker: cp,
    defender: defenderPlayer,
  });

  setTimeout(() => {
    if (tgt.armies <= 0) {
      // Territory captured
      onTerritoryCaptured(srcName, tgtName, atkCount, cb);
    } else {
      render();
      cb && cb();
    }
  }, 420);
}

function onTerritoryCaptured(srcName, tgtName, atkDiceRolled, cb) {
  const src = state.territories[srcName];
  const tgt = state.territories[tgtName];
  const cp = currentPlayer();
  const defenderId = tgt.owner;
  // Transfer ownership
  tgt.owner = cp.id;
  tgt.armies = 0; // will be moved in
  state.conqueredThisTurn = true;
  if (typeof buzz === "function" && !cp.isAI) buzz(50);
  // === MARKER: hook-capture ===
  Hooks.emit("capture", { source: srcName, target: tgtName, attacker: cp, defender: playerById(defenderId) });
  // Check defender elimination
  const defender = playerById(defenderId);
  const defenderEliminated = defender && !ownedBy(defenderId).length;
  if (defenderEliminated) {
    defender.eliminated = true;
    log(`<b>${defender.name} has been eliminated by ${cp.name}!</b>`);
    // === MARKER: hook-eliminate ===
    Hooks.emit("eliminate", { attacker: cp, defender });
    // Transfer cards
    if (defender.cards.length > 0) {
      cp.cards.push(...defender.cards);
      log(`${cp.name} seizes ${defender.cards.length} card(s) from ${defender.name}.`);
      defender.cards = [];
    }
  }

  // Check victory (everyone else eliminated)
  const remaining = state.players.filter(p => !p.eliminated);
  if (remaining.length === 1 || ownedBy(cp.id).length === TERR_ORDER.length) {
    render();
    setTimeout(() => declareVictory(cp), 400);
    return;
  }

  // Prompt army move
  const min = Math.max(1, atkDiceRolled);
  const max = src.armies - 1;
  const movable = Math.max(min, 0);
  if (max < min) {
    // edge case: shouldn't happen since winning required armies, but fallback
    const mv = Math.max(1, src.armies - 1);
    src.armies -= mv;
    tgt.armies += mv;
    afterArmyMove(cp, defenderEliminated, cb);
    return;
  }
  if (cp.isAI) {
    // AI moves max
    const mv = max;
    src.armies -= mv;
    tgt.armies += mv;
    if (cp.personality) flog("capture", { source: srcName, target: tgtName, count: mv }, cp);
    else log(`${cp.name} moves ${mv} armies into ${tgtName}.`);
    render();
    setTimeout(() => afterArmyMove(cp, defenderEliminated, cb), 200);
  } else {
    openMoveModal(srcName, tgtName, min, max, () => {
      afterArmyMove(cp, defenderEliminated, cb);
    });
  }
}

function openMoveModal(srcName, tgtName, min, max, done) {
  const root = document.getElementById("modal-root");
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <h2>Advance Armies</h2>
    <div class="subtext">Captured <b>${tgtName}</b>. Move armies from <b>${srcName}</b> into the conquered territory. Minimum ${min}, maximum ${max}.</div>
    <div class="slider-row">
      <input type="range" min="${min}" max="${max}" value="${max}" id="move-slider">
      <span class="count" id="move-count">${max}</span>
    </div>
    <div class="modal-buttons">
      <button class="btn" id="move-confirm-btn">Advance</button>
    </div>
  `;
  backdrop.appendChild(m);
  root.appendChild(backdrop);
  const sl = m.querySelector("#move-slider");
  const ct = m.querySelector("#move-count");
  sl.addEventListener("input", () => ct.textContent = sl.value);
  m.querySelector("#move-confirm-btn").addEventListener("click", () => {
    const n = parseInt(sl.value, 10);
    state.territories[srcName].armies -= n;
    state.territories[tgtName].armies += n;
    log(`${currentPlayer().name} moves ${n} armies into ${tgtName}.`);
    backdrop.remove();
    render();
    done && done();
  });
}

function afterArmyMove(cp, defenderEliminated, cb) {
  // keep target selected as new source if armies > 1 — standard Risk allows continued attacks
  // The prompt says human clicks to pick next. We'll clear target but keep source possibility by resetting.
  state.selected.target = null;
  // If eliminator holds ≥5 cards now, force trade
  if (defenderEliminated && cp.cards.length >= 5) {
    if (cp.isAI) {
      aiForceTrade(cp, /*duringAttack*/ true, () => {
        render();
        cb && cb();
      });
    } else {
      openHumanForcedTradeAttack(cb);
    }
    return;
  }
  render();
  cb && cb();
}

function openHumanForcedTradeAttack(done) {
  const cp = currentPlayer();
  if (cp.cards.length < 5) { done && done(); return; }
  const root = document.getElementById("modal-root");
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <h2>Forced Trade (Mid-Attack)</h2>
    <div class="subtext">You seized cards from an eliminated foe and now hold ${cp.cards.length}. Trade a set immediately. Bonus armies will be placed on your territories now. If you can't form a valid set, select one card and discard it.</div>
    <div class="card-list" id="mid-trade-list"></div>
    <div class="modal-buttons">
      <button class="btn" id="mid-trade-btn" disabled>Trade Set</button>
      <button class="btn" id="mid-discard-btn" disabled>Discard Card</button>
    </div>
  `;
  backdrop.appendChild(m);
  root.appendChild(backdrop);
  const selected = new Set();
  function refresh() {
    const list = m.querySelector("#mid-trade-list");
    list.innerHTML = "";
    cp.cards.forEach((c, i) => {
      const matches = c.territory && state.territories[c.territory].owner === cp.id;
      const cls = ["card-chip"];
      if (c.type === "Wild") cls.push("wild");
      if (selected.has(i)) cls.push("selected");
      if (matches) cls.push("match");
      const span = document.createElement("span");
      span.className = cls.join(" ");
      span.textContent = c.type === "Wild" ? "✦ Wild" : (c.type[0] + " · " + c.territory);
      span.addEventListener("click", () => {
        if (selected.has(i)) selected.delete(i);
        else if (selected.size < 3) selected.add(i);
        refresh();
      });
      list.appendChild(span);
    });
    const trio = Array.from(selected).map(i => cp.cards[i]);
    m.querySelector("#mid-trade-btn").disabled = !(trio.length === 3 && validSet(trio));
    m.querySelector("#mid-discard-btn").disabled = selected.size !== 1;
  }
  refresh();
  m.querySelector("#mid-trade-btn").addEventListener("click", () => {
    const idxs = Array.from(selected).sort((a,b)=>b-a);
    executeTrade(cp, idxs);
    // place bonus armies: open mid-attack placement modal
    backdrop.remove();
    // Place armies now (human clicks)
    openMidAttackPlacementModal(done);
  });
  m.querySelector("#mid-discard-btn").addEventListener("click", () => {
    const idxs = Array.from(selected).sort((a,b)=>b-a);
    discardCards(cp, idxs);
    backdrop.remove();
    if (cp.cards.length >= 5) { openHumanForcedTradeAttack(done); return; }
    render();
    done && done();
  });
}

function openMidAttackPlacementModal(done) {
  const cp = currentPlayer();
  if (state.pendingReinforcements <= 0) {
    // done — but might still need another trade if still ≥5
    if (cp.cards.length >= 5) { openHumanForcedTradeAttack(done); return; }
    done && done();
    return;
  }
  const root = document.getElementById("modal-root");
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `
    <h2>Place Bonus Armies</h2>
    <div class="subtext">Close this and click your territories on the map to place ${state.pendingReinforcements} bonus armies. You will automatically return to the attack phase once all are placed.</div>
    <div class="modal-buttons">
      <button class="btn" id="mid-place-done-btn">OK</button>
    </div>
  `;
  backdrop.appendChild(m);
  root.appendChild(backdrop);
  m.querySelector("#mid-place-done-btn").addEventListener("click", () => {
    backdrop.remove();
    // Switch to reinforce phase with mid-attack flag; onTerritoryClick will
    // fire the resume callback once pendingReinforcements hits 0.
    state.midAttackPlacement = true;
    midAttackResume = () => {
      state.midAttackPlacement = false;
      if (cp.cards.length >= 5) {
        openHumanForcedTradeAttack(done);
      } else {
        state.phase = "attack";
        render();
        done && done();
      }
    };
    state.phase = "reinforce";
    render();
  });
}

function showDiceInSidebar(atkDice, defDice) {
  // Persist in state so they survive re-renders
  state.lastDice = { atk: atkDice.slice(), def: defDice.slice(), shakeId: Date.now() };
  renderDiceFromState(true);
}
function renderDiceFromState(withShake) {
  const row = document.getElementById("dice-row");
  if (!row) return;
  row.innerHTML = "";
  if (!state.lastDice) return;
  state.lastDice.atk.forEach(v => row.appendChild(makeDie(v, "atk")));
  state.lastDice.def.forEach(v => row.appendChild(makeDie(v, "def")));
  if (withShake) {
    setTimeout(() => row.querySelectorAll(".die").forEach(d => d.classList.add("shake")), 0);
  }
}
function makeDie(value, kind) {
  const el = document.createElement("div");
  el.className = "die " + kind;
  // pip positions (grid index) for values 1..6
  const PIP_MAP = {
    1: [4],
    2: [0, 8],
    3: [0, 4, 8],
    4: [0, 2, 6, 8],
    5: [0, 2, 4, 6, 8],
    6: [0, 2, 3, 5, 6, 8],
  };
  const pips = new Set(PIP_MAP[value]);
  for (let i = 0; i < 9; i++) {
    const p = document.createElement("div");
    p.className = "pip" + (pips.has(i) ? "" : " hidden");
    el.appendChild(p);
  }
  return el;
}

function runBlitz(srcName, tgtName, cb) {
  // Auto-roll rounds every ~120ms until either side can't continue
  const cp = currentPlayer();
  const step = () => {
    const src = state.territories[srcName];
    const tgt = state.territories[tgtName];
    if (src.armies < 2) { render(); cb && cb(); return; }
    if (tgt.owner === cp.id) { render(); cb && cb(); return; } // captured
    if (tgt.armies <= 0) { render(); cb && cb(); return; }
    runOneRoll(srcName, tgtName, () => {
      // After one roll completed (and any capture modal resolved asynchronously for human)
      // If capture happened, the capture flow resets selection. Stop blitz.
      if (state.selected.target !== tgtName || state.territories[tgtName].owner === cp.id) {
        render(); cb && cb(); return;
      }
      setTimeout(step, 120);
    });
  };
  step();
}

function endAttackPhase() {
  const cp = currentPlayer();
  // Award card if conquered
  if (state.conqueredThisTurn) {
    drawCardFor(cp);
  }
  state.phase = "fortify";
  state.selected = { source: null, target: null };
  state.lastDice = null;
  render();
  if (cp.isAI) setTimeout(aiFortify, 500);
}

function drawCardFor(player) {
  if (state.deck.length === 0) {
    // refill from discard
    state.deck = shuffle(state.discard);
    state.discard = [];
  }
  if (state.deck.length > 0) {
    const card = state.deck.shift();
    player.cards.push(card);
    log(`${player.name} earns a territory card (${card.type === "Wild" ? "Wild" : card.type + "/" + card.territory}).`);
  }
}

/* =========================================================================
   FORTIFY + END TURN
   ========================================================================= */

function doFortify(srcName, tgtName, count) {
  const src = state.territories[srcName];
  const tgt = state.territories[tgtName];
  if (src.owner !== tgt.owner) { toast("Both territories must be yours."); return; }
  if (!src.adj.includes(tgtName)) { toast("Territories must be adjacent."); return; }
  if (count < 1 || count >= src.armies) { toast("Invalid count."); return; }
  src.armies -= count;
  tgt.armies += count;
  log(`${currentPlayer().name} fortifies ${tgtName} with ${count} armies from ${srcName}.`);
  state.fortifyUsed = true;
  endTurn();
}

function endTurn() {
  advanceTurn();
}

function advanceTurn() {
  // === MARKER: hook-turn-end ===
  const prevPlayer = state.players[state.currentPlayerIdx];
  Hooks.emit("turnEnd", { player: prevPlayer, turn: state.turn });
  // Move to next non-eliminated player
  const n = state.players.length;
  let next = state.currentPlayerIdx;
  for (let step = 1; step <= n; step++) {
    const idx = (state.currentPlayerIdx + step) % n;
    if (!state.players[idx].eliminated) {
      next = idx;
      break;
    }
  }
  // If next wraps around past the last non-eliminated, increment turn
  if (next <= state.currentPlayerIdx) state.turn += 1;
  state.currentPlayerIdx = next;
  state.phase = "reinforce";
  state.selected = { source: null, target: null };
  beginReinforcePhase();
}

/* =========================================================================
   VICTORY

function declareVictory(player) {
  state.phase = "victory";
  log(`<b>${player.name} has achieved world domination!</b>`);
  // Post-game goal reveal
  state.players.filter(p => p.goal).forEach(p => {

    log(`<i>${p.name} [${p.personality?.name || ""}]: goal <b>${p.goal.type}</b> — ${complete ? "FULFILLED" : "abandoned"}</i>`);
  });
  try { Persist.recordGame(player, state.players); } catch(e){}

  root.innerHTML = `
    <div id="victory-overlay">
      <div id="victory-panel">
        <div class="crown">★ World Domination ★</div>

        <h1>${player.name}</h1>
        <div class="meta">Turn ${state.turn} · ${ownedContinents(player.id).length} continent(s) · 42 territories</div>
        <button class="btn" id="play-again-btn">Play Again</button>
      </div>
    </div>
  `;
  document.getElementById("play-again-btn").addEventListener("click", resetGame);
}

function resetGame() {

/* =========================================================================
   AI
   ========================================================================= */

function scheduleIfAI() {
  const cp = currentPlayer();
  if (!cp || !cp.isAI) return;
  if (state.phase === "setup-reinforce") {
    setTimeout(aiSetupReinforce, 250);
  } else if (state.phase === "reinforce") {
    setTimeout(aiReinforcePhase, 500);
  } else if (state.phase === "attack") {
    setTimeout(aiAttackPhase, 500);
  } else if (state.phase === "fortify") {
    setTimeout(aiFortify, 500);
  }
}

// --- Setup reinforce for AI ---
function aiSetupReinforce() {
  const cp = currentPlayer();
  if (cp.armies <= 0) { advanceSetupReinforce(); return; }
  const owned = ownedBy(cp.id);
  const best = pickReinforceTerritory(cp, owned);
  state.territories[best].armies += 1;
  cp.armies -= 1;
  if (cp.personality) flog("deploy", { n: 1, terr: best }, cp);
  else log(`${cp.name} deploys 1 to ${best}.`);
  render();
  setTimeout(advanceSetupReinforce, 220);
}

// --- Reinforce heuristic ---
function scoreReinforceTerritory(name, player) {
  const t = state.territories[name];
  const adjEnemies = t.adj.filter(a => state.territories[a].owner !== player.id);
  let score = 0;
  score += 10 * adjEnemies.length * Persona.w(player, "reinforce.adjEnemies");
  const maxEnemyArmies = adjEnemies.length > 0
    ? Math.max(...adjEnemies.map(a => state.territories[a].armies))
    : 0;
  score += 5 * maxEnemyArmies * Persona.w(player, "reinforce.maxEnemyArmies");
  if (continentOwnedBy(t.continent, player.id) && adjEnemies.length > 0) {
    score += 15 * Persona.w(player, "reinforce.continentBorder");
  }
  const contTerrs = TERR_ORDER.filter(n => state.territories[n].continent === t.continent);
  const missing = contTerrs.filter(n => state.territories[n].owner !== player.id);
  if (missing.length === 1 && t.adj.includes(missing[0])) {
    score += 8 * Persona.w(player, "reinforce.nearContinent");
  }
  const adjFriendly = t.adj.length - adjEnemies.length;
  score -= 5 * adjFriendly * Persona.w(player, "reinforce.adjFriendly");
  // === MARKER: scoring-reinforce ===
  return Scoring.applyReinforce(name, player, score);
}
function pickReinforceTerritory(player, owned) {
  // === MARKER: decision-reinforce ===
  const options = owned.map(n => ({ name: n, score: scoreReinforceTerritory(n, player) }));
  const chosen = Decision.pick(options, { kind: "reinforce", player });
  return chosen ? chosen.name : owned[0];
}

function aiReinforcePhase() {
  const cp = currentPlayer();
  // Trade cards if possible
  while (cp.cards.length >= 3) {
    const idxs = findBestAISet(cp);
    if (!idxs) break;
    executeTrade(cp, idxs.slice().sort((a,b)=>b-a));
    render();
  }
  // place armies one at a time
  placeAIReinforce();
}
function placeAIReinforce() {
  const cp = currentPlayer();
  if (state.pendingReinforcements <= 0) {
    state.phase = "attack";
    render();
    setTimeout(aiAttackPhase, 500);
    return;
  }
  const owned = ownedBy(cp.id);
  const best = pickReinforceTerritory(cp, owned);
  state.territories[best].armies += 1;
  state.pendingReinforcements -= 1;
  // Only voice every ~3 deploys to reduce spam
  if (cp.personality && state.pendingReinforcements % 3 === 0) {
    flog("deploy", { n: 1, terr: best }, cp);
  }
  render();
  setTimeout(placeAIReinforce, 120);
}

// --- Attack heuristic ---
function scoreAttack(source, target, player) {
  const src = state.territories[source];
  const tgt = state.territories[target];
  let score = 0;
  const tgtCont = tgt.continent;
  const contTerrs = TERR_ORDER.filter(n => state.territories[n].continent === tgtCont);
  const aiOwnsOthers = contTerrs.filter(n => n !== target).every(n => state.territories[n].owner === player.id);
  if (aiOwnsOthers) score += 20 * Persona.w(player, "attack.completeContinent");
  const oppId = tgt.owner;
  const oppOwnsContinent = contTerrs.every(n => state.territories[n].owner === oppId);
  if (oppOwnsContinent && contTerrs.length > 1) score += 15 * Persona.w(player, "attack.breakContinent");
  const opp = playerById(oppId);
  if (opp) {
    const oppTerrs = ownedBy(oppId);
    if (oppTerrs.length <= 3 && target === oppTerrs.reduce((min, n) => state.territories[n].armies < state.territories[min].armies ? n : min, oppTerrs[0])) {
      score += 10 * Persona.w(player, "attack.eliminate");
    }
  }
  score += 5 * (src.armies - tgt.armies) * Persona.w(player, "attack.armyAdvantage");
  if (src.armies <= tgt.armies && !aiOwnsOthers) score -= 50 * Persona.w(player, "attack.hopelessPenalty");
  // === MARKER: scoring-attack ===
  return Scoring.applyAttack(source, target, player, score);
}

function aiAttackPhase() {
  const cp = currentPlayer();
  let attacksMade = 0;
  const MAX_ATTACKS = 8;

  const iterate = () => {
    if (attacksMade >= MAX_ATTACKS) { finishAIAttack(cp); return; }
    if (state.phase !== "attack") return;
    // Collect all attack options
    const options = [];
    for (const src of ownedBy(cp.id)) {
      const sT = state.territories[src];
      if (sT.armies < 3) continue;
      if (!Rule.canAttack(cp, src)) continue;  // Shogun min-stack / Hermit early-turn gate
      for (const adj of sT.adj) {
        if (state.territories[adj].owner !== cp.id) {
          options.push({ source: src, target: adj, score: scoreAttack(src, adj, cp) });
        }
      }
    }
    if (options.length === 0) { finishAIAttack(cp); return; }
    // === MARKER: decision-attack ===
    const chosen = Decision.pick(options, { kind: "attack", player: cp, turn: state.turn });
    if (!chosen || chosen.score <= 0) { finishAIAttack(cp); return; }
    const best = chosen;
    // Stop if AI holds ≥1 conquest and max source stack ≤3
    if (attacksMade >= 1) {
      const maxSrc = Math.max(...ownedBy(cp.id).map(n => state.territories[n].armies));
      if (maxSrc <= 3) { finishAIAttack(cp); return; }
    }
    // Execute attack with blitz
    state.selected.source = best.source;
    state.selected.target = best.target;
    render();
    attacksMade++;
    // AI blitzes
    aiBlitz(best.source, best.target, () => {
      state.selected.source = null;
      state.selected.target = null;
      setTimeout(iterate, 400);
    });
  };
  iterate();
}

function aiBlitz(srcName, tgtName, cb) {
  // Similar to runBlitz but with guaranteed AI behavior (auto-advance max)
  const cp = currentPlayer();
  const step = () => {
    const src = state.territories[srcName];
    const tgt = state.territories[tgtName];
    if (src.armies < 2) { cb && cb(); return; }
    if (tgt.owner === cp.id) { cb && cb(); return; }
    runOneRoll(srcName, tgtName, () => {
      // if captured, capture flow already handled via onTerritoryCaptured (AI auto-moves)
      if (state.territories[tgtName].owner === cp.id) {
        cb && cb(); return;
      }
      // continue
      setTimeout(step, 180);
    });
  };
  step();
}

function finishAIAttack(cp) {
  if (state.conqueredThisTurn) drawCardFor(cp);
  state.phase = "fortify";
  state.selected = { source: null, target: null };
  render();
  setTimeout(aiFortify, 500);
}

// --- Fortify (AI) ---
function aiFortify() {
  const cp = currentPlayer();
  if (state.phase !== "fortify") return;
  const owned = ownedBy(cp.id);
  // Find owned territory with highest armies AND no adj enemy
  let candidates = owned.filter(n => {
    const t = state.territories[n];
    return t.armies >= 2 && t.adj.every(a => state.territories[a].owner === cp.id);
  });
  if (candidates.length === 0) {
    log(`${cp.name} declines to fortify.`);
    advanceTurn();
    return;
  }
  candidates.sort((a, b) => state.territories[b].armies - state.territories[a].armies);
  const src = candidates[0];
  // Pick adjacent friendly with highest adjacent-enemy-armies total
  const srcT = state.territories[src];
  let bestDest = null, bestScore = -1;
  for (const adj of srcT.adj) {
    if (state.territories[adj].owner !== cp.id) continue;
    const adjT = state.territories[adj];
    const enemyTotal = adjT.adj.reduce((s, n) => s + (state.territories[n].owner !== cp.id ? state.territories[n].armies : 0), 0);
    if (enemyTotal > bestScore) { bestScore = enemyTotal; bestDest = adj; }
  }
  if (!bestDest) {
    advanceTurn();
    return;
  }
  const move = srcT.armies - 1;
  srcT.armies -= move;
  state.territories[bestDest].armies += move;
  if (cp.personality) flog("fortify", { count: move, target: bestDest }, cp);
  else log(`${cp.name} fortifies ${bestDest} with ${move} armies from ${src}.`);
  render();
  setTimeout(advanceTurn, 400);
}

// --- AI forced trade ---
function aiForceTrade(player, duringAttack, done) {
  while (player.cards.length >= 5) {
    const idxs = findBestAISet(player);
    if (!idxs) break;
    executeTrade(player, idxs.slice().sort((a,b)=>b-a));
  }
  // If during reinforce, armies go into pendingReinforcements normally
  // If during attack, we also need to place them immediately
  if (duringAttack) {
    // place armies via AI reinforce heuristic right away
    while (state.pendingReinforcements > 0) {
      const owned = ownedBy(player.id);
      if (owned.length === 0) break;
      const best = pickReinforceTerritory(player, owned);
      state.territories[best].armies += 1;
      state.pendingReinforcements -= 1;
    }
    log(`${player.name} places forced-trade bonus armies and continues the attack.`);
    render();
    done && done();
  } else {
    render();
    scheduleIfAI();
  }
}

/* =========================================================================
   MOBILE HELPERS — tabs, haptics, iOS keyboard scroll
   ========================================================================= */

// Light haptic buzz on supported devices. Silently no-ops otherwise.
function buzz(ms = 10) {
  try {
    if (navigator && typeof navigator.vibrate === "function") navigator.vibrate(ms);
  } catch (e) { /* ignore */ }
}

// Track whether user manually picked a tab this phase so auto-switch respects them.
let _mobileTabManualOverride = false;
let _mobileLastPhase = null;

function isMobileViewport() {
  return window.innerWidth < 900;
}

function selectTab(tabId) {
  const bar = document.getElementById("sidebar-tabs");
  if (!bar) return;
  const buttons = bar.querySelectorAll("button[data-tab]");
  let matched = false;
  buttons.forEach(btn => {
    if (btn.dataset.tab === tabId) { btn.classList.add("active"); matched = true; }
    else btn.classList.remove("active");
  });
  if (!matched) return;
  // Mark the matching panel(s) active-tab; hide siblings (via CSS in mobile view)
  const sections = document.querySelectorAll("#sidebar .panel-section[data-tab]");
  sections.forEach(sec => {
    if (sec.dataset.tab === tabId) sec.classList.add("active-tab");
    else sec.classList.remove("active-tab");
  });
}

function autoSwitchTab() {
  if (!isMobileViewport()) return;
  if (!state || !state.phase) return;
  const phase = state.phase;
  // On a new phase, clear the manual override so the relevant tab gets focus.
  if (phase !== _mobileLastPhase) {
    _mobileTabManualOverride = false;
    _mobileLastPhase = phase;
  }
  if (_mobileTabManualOverride) return;
  const map = {
    "setup-claim": "controls",
    "setup-reinforce": "controls",
    "reinforce": "controls",
    "attack": "controls",
    "fortify": "controls",
    "victory": "roster",
  };
  selectTab(map[phase] || "controls");
}

function wireMobileTabs() {
  const bar = document.getElementById("sidebar-tabs");
  if (!bar) return;
  bar.querySelectorAll("button[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      selectTab(btn.dataset.tab);
      _mobileTabManualOverride = true;
      buzz(8);
    });
  });
  // Default: activate "turn" panel-section so something is visible pre-game.
  selectTab("turn");
}

// iOS keyboard: when an input on the setup screen is focused, scroll it above the keyboard.
function wireSetupKeyboardScroll() {
  const handler = (e) => {
    setTimeout(() => {
      try { e.target.scrollIntoView({ behavior: "smooth", block: "center" }); } catch (_) {}
    }, 300);
  };
  document.querySelectorAll("#setup-overlay input[type=text], #setup-overlay .p-name").forEach(input => {
    input.addEventListener("focus", handler);
  });
  // Capture future slots rendered after initSetupScreen re-renders.
  const setupRoot = document.getElementById("setup-overlay");
  if (setupRoot) {
    setupRoot.addEventListener("focusin", (ev) => {
      if (ev.target && (ev.target.matches('input[type=text]') || ev.target.classList.contains('p-name'))) {
        setTimeout(() => {
          try { ev.target.scrollIntoView({ behavior: "smooth", block: "center" }); } catch(_) {}
        }, 300);
      }
    });
  }
}

// Switch to Feed on AI turn so user sees narration (todo 14).
Hooks.on("turnStart", ({ player }) => {
  if (!isMobileViewport()) return;
  if (player && player.isAI) {
    _mobileTabManualOverride = false;
    selectTab("feed");
  }
});

/* =========================================================================
   BOOT
   ========================================================================= */

window.addEventListener("DOMContentLoaded", () => {
  initSetupScreen();
  wireMobileTabs();
  wireSetupKeyboardScroll();
  const saveBtn = document.getElementById("save-game-btn");
  if (saveBtn) saveBtn.addEventListener("click", saveCurrentGame);
  const loadBtn = document.getElementById("load-game-btn");
  if (loadBtn) loadBtn.addEventListener("click", loadGameFromSidebar);
  updateSaveInfo();
});
</script>
