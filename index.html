<!DOCTYPE html>
<html lang="en">
<head>

<meta property="og:type" content="website" />
<meta property="og:title" content="RISK — Cold War Edition" />

<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="RISK — Cold War Edition" />
<meta name="twitter:description" content="Browser RISK with nine AI archetypes, each with their own moods, grudges and reputations." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-0: #0a1628;
  --bg-1: #142440;
  --panel-bg: rgba(10, 22, 40, 0.92);
  --panel-border: rgba(217, 119, 6, 0.3);
  --divider: rgba(255, 255, 255, 0.06);
  --amber: #d97706;
  --amber-2: #f59e0b;
  --crimson: #dc2626;
  --sapphire: #2563eb;
  --emerald: #059669;
  --violet: #7c3aed;
  --rose: #ec4899;
  --neutral: #475569;
  --text-1: #e5e7eb;
  --text-2: #94a3b8;
  --text-3: #64748b;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, var(--bg-1) 0%, var(--bg-0) 70%);
  color: var(--text-1);
  font-family: var(--font-sans);
  overflow: hidden;
  user-select: none;
}
body::before {
  content: "";
  position: fixed; inset: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}
#app { position: relative; z-index: 1; width: 100vw; height: 100vh; display: flex; }

/* ---------------- Map ---------------- */
#map-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#map-svg {
  width: 100%; height: 100%;
  display: block;
}
.continent-label {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 600;
  fill: rgba(255,255,255,0.18);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  pointer-events: none;
}
.adj-line { stroke: rgba(255,255,255,0.15); stroke-width: 1; fill: none; pointer-events: none; }
.adj-line.dashed { stroke-dasharray: 4 4; }
.adj-line.pulse {
  stroke: var(--amber);
  stroke-width: 2;
  animation: pulseFade 600ms ease-out forwards;
}
@keyframes pulseFade {
  0% { stroke-opacity: 1; stroke-width: 3; }
  100% { stroke-opacity: 0; stroke-width: 2; }
}
.node-group { cursor: pointer; transition: transform 150ms ease; transform-origin: center; transform-box: fill-box; }
.node-group.unclickable { cursor: default; }
.node-circle {
  stroke-width: 2;
  transition: r 150ms ease, filter 150ms ease;
}
.node-circle.neutral { fill: var(--neutral); stroke-dasharray: 3 3; stroke: #cbd5e1; }
.node-group.selected .node-circle { filter: drop-shadow(0 0 8px var(--amber)); r: 22; }
.node-group.source .node-circle { filter: drop-shadow(0 0 10px var(--amber-2)); r: 22; }
.node-group.target .node-circle { filter: drop-shadow(0 0 10px var(--crimson)); r: 22; }
.node-group.hoverable:hover .node-circle { filter: drop-shadow(0 0 6px rgba(255,255,255,0.4)); }
.node-label {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 14px;
  fill: #fff;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  paint-order: stroke;
  stroke: rgba(0,0,0,0.55);
  stroke-width: 3;
  stroke-linejoin: round;
}
.node-name {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 500;
  fill: rgba(255,255,255,0.6);
  text-anchor: middle;
  pointer-events: none;
  paint-order: stroke;
  stroke: rgba(0,0,0,0.6);
  stroke-width: 2.5;
  stroke-linejoin: round;
}
.edge-arrow { fill: rgba(255,255,255,0.35); pointer-events: none; }

/* ---------------- Sidebar ---------------- */
#sidebar {
  width: 340px;
  min-width: 340px;
  height: 100vh;
  background: var(--panel-bg);
  border-left: 1px solid var(--panel-border);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 5;
}
.panel-section { padding: 14px 18px; border-bottom: 1px solid var(--divider); }
.panel-section:last-child { border-bottom: none; }
#game-title {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: 0.24em;
  padding: 16px 18px 10px;
  text-align: center;
  border-bottom: 1px solid var(--divider);
}
#turn-info { display: flex; align-items: center; gap: 10px; }
#turn-info .swatch {
  width: 22px; height: 22px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.3);
}
#turn-info .name {
  font-family: var(--font-sans); font-weight: 600; font-size: 14px;
}
#turn-info .turn-num {
  margin-left: auto;
  font-family: var(--font-mono); font-size: 12px; color: var(--text-2);
}
#phase-label {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 600;
  color: var(--text-1);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
#phase-help {
  font-family: var(--font-sans);
  font-size: 11px;
  color: var(--text-2);
  line-height: 1.5;
}

.stat-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 12px; }
.stat-row .lbl { color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; }
.stat-row .val { font-family: var(--font-mono); font-size: 14px; color: var(--amber); font-weight: 700; }

.btn {
  display: inline-block;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 16px;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  background: var(--amber);
  color: #fff;
  transition: opacity 120ms, transform 60ms;
  margin: 3px 4px 3px 0;
}
.btn:hover:not(:disabled) { opacity: 0.88; }
.btn:active:not(:disabled) { transform: translateY(1px); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn.secondary { background: rgba(255,255,255,0.08); color: var(--text-1); }
.btn.danger { background: var(--crimson); }
.btn.full { width: 100%; margin: 4px 0; }

.slider-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
.slider-row input[type=range] { flex: 1; accent-color: var(--amber); }
.slider-row .count {
  font-family: var(--font-mono); font-weight: 700;
  min-width: 36px; text-align: right; color: var(--amber);
}

.sel-display {
  font-size: 11px; color: var(--text-2);
  margin: 6px 0;
  font-family: var(--font-sans);
  line-height: 1.5;
}
.sel-display .terr { color: var(--text-1); font-weight: 600; }

/* Dice */
.dice-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0; min-height: 48px; }
.die {
  width: 48px; height: 48px;
  background: #f5f5f4;
  border-radius: 8px;
  position: relative;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5), inset 0 -2px 0 rgba(0,0,0,0.1);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr 1fr;
  padding: 6px;
  gap: 2px;
}
.die.atk { border-bottom: 3px solid var(--crimson); }
.die.def { border-bottom: 3px solid var(--sapphire); }
.die.shake { animation: dieShake 380ms ease-in-out; }
@keyframes dieShake {
  0%,100% { transform: rotate(0); }
  15% { transform: translate(-2px,-3px) rotate(-8deg); }
  30% { transform: translate(3px,2px) rotate(10deg); }
  45% { transform: translate(-1px,3px) rotate(-6deg); }
  60% { transform: translate(2px,-2px) rotate(5deg); }
  75% { transform: translate(-2px,1px) rotate(-3deg); }
  90% { transform: translate(1px,0) rotate(1deg); }
}
.die .pip {
  width: 6px; height: 6px;
  background: #111;
  border-radius: 50%;
  align-self: center; justify-self: center;
}
.die .pip.hidden { visibility: hidden; }

/* Roster */
.roster { display: flex; flex-direction: column; gap: 6px; }
.roster-row { display: grid; grid-template-columns: 14px 1fr auto auto auto; gap: 8px; align-items: center; font-size: 11px; padding: 4px 0; }
.roster-row.active { background: rgba(217,119,6,0.08); border-radius: 3px; padding: 4px 6px; }
.roster-row .swatch { width: 12px; height: 12px; border-radius: 2px; }
.roster-row .pname { font-weight: 600; color: var(--text-1); }
.roster-row.eliminated .pname { text-decoration: line-through; color: var(--text-3); }
.roster-row .rstat { font-family: var(--font-mono); font-size: 10px; color: var(--text-2); min-width: 24px; text-align: right; }

/* Log */
#log-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
#log-list {
  overflow-y: auto;
  flex: 1;
  font-size: 11px;
  line-height: 1.55;
  color: var(--text-2);
  padding-right: 4px;
}
#log-list .entry { padding: 3px 0; border-bottom: 1px dotted rgba(255,255,255,0.04); }
#log-list .entry:last-child { border-bottom: none; }
#log-list::-webkit-scrollbar { width: 4px; }
#log-list::-webkit-scrollbar-thumb { background: rgba(217,119,6,0.4); border-radius: 2px; }
.section-title {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--amber);
  margin-bottom: 8px;
}

/* Card list */
.card-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.card-chip {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text-1);
  cursor: pointer;
  display: flex; gap: 4px; align-items: center;
}
.card-chip.selected { background: var(--amber); color: #fff; border-color: var(--amber); }
.card-chip.match::after { content: "★"; color: var(--amber); font-size: 9px; }
.card-chip.selected.match::after { color: #fff; }
.card-chip.wild { background: rgba(124,58,237,0.25); border-color: rgba(124,58,237,0.5); }
.card-chip.wild.selected { background: var(--violet); }

/* ---------------- Setup overlay ---------------- */
#setup-overlay {
  position: fixed; inset: 0;
  background: rgba(10,22,40,0.96);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}
#setup-panel {
  width: 520px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  padding: 28px 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#setup-panel h1 {
  font-family: var(--font-serif);
  font-size: 42px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: 0.3em;
  text-align: center;
  margin-bottom: 4px;
}
#setup-panel .subtitle {
  text-align: center;
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.setup-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
.setup-row label { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.1em; min-width: 120px; }
.setup-row select, .setup-row input[type=text] {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--panel-border);
  color: var(--text-1);
  padding: 6px 10px;
  font-family: var(--font-sans);
  font-size: 13px;
  border-radius: 3px;
  flex: 1;
}
.setup-row input[type=text]:focus, .setup-row select:focus { outline: none; border-color: var(--amber); }
.player-slots { margin: 16px 0; border-top: 1px solid var(--divider); padding-top: 14px; }
.player-slot {
  display: grid;
  grid-template-columns: 20px 1fr 80px 130px;
  gap: 8px;
  align-items: center;
  margin: 6px 0;
}
.player-slot .arch-desc {
  grid-column: 2 / -1;
  font-size: 10px;
  color: var(--text-3);
  line-height: 1.4;
  margin-top: 2px;
  min-height: 14px;
}
.player-slot .arch-era {
  color: var(--amber);
  font-weight: 600;
}
.player-slot select.p-arch:disabled {
  opacity: 0.3;
}
.mood-badge { display: inline-block; font-family: var(--font-mono); font-size: 11px; }
.rep-badge { display: inline-block; font-family: var(--font-mono); }
.grudge-badge { color: var(--crimson); font-size: 9px; margin-left: 4px; font-weight: 700; }
#last-game-summary {
  text-align: center;
  font-size: 10px;
  color: var(--text-3);
  margin-bottom: 10px;
  min-height: 12px;
}
.entry.voice-intent { font-style: italic; color: var(--text-3); border-left: 2px solid var(--amber); padding-left: 6px; }
.player-slot .swatch { width: 20px; height: 20px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); }
.player-slot input[type=text] {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--panel-border);
  color: var(--text-1);
  padding: 5px 8px;
  font-size: 12px;
  border-radius: 3px;
}
.player-slot select {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--panel-border);
  color: var(--text-1);
  padding: 5px 8px;
  font-size: 12px;
  border-radius: 3px;
}

/* ---------------- Toasts ---------------- */
#toast-container {
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--panel-bg);
  border-left: 3px solid var(--amber);
  color: var(--text-1);
  font-size: 12px;
  padding: 10px 16px;
  border-radius: 3px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  animation: toastIn 180ms ease-out, toastOut 240ms ease-in 2.76s forwards;
  max-width: 440px;
}
@keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-10px); } }

/* ---------------- Modal ---------------- */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex; align-items: center; justify-content: center;
  z-index: 150;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  padding: 22px 26px;
  min-width: 360px;
  max-width: 520px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}
.modal h2 {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: 22px;
  letter-spacing: 0.14em;
  color: var(--amber);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.modal .subtext { font-size: 11px; color: var(--text-2); margin-bottom: 14px; line-height: 1.5; }
.modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; flex-wrap: wrap; }

/* Victory */
#victory-overlay {
  position: fixed; inset: 0;
  background: rgba(10,22,40,0.96);
  display: flex; align-items: center; justify-content: center;
  z-index: 300;
  backdrop-filter: blur(6px);
  animation: toastIn 400ms ease-out;
}
#victory-panel {
  background: var(--panel-bg);
  border: 2px solid var(--amber);
  border-radius: 8px;
  padding: 40px 60px;
  text-align: center;
  box-shadow: 0 0 80px rgba(217,119,6,0.3);
}
#victory-panel .crown {
  font-family: var(--font-serif);
  font-size: 14px;
  letter-spacing: 0.5em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 10px;
}
#victory-panel .winner-color {
  width: 80px; height: 80px;
  margin: 0 auto 18px;
  border-radius: 6px;
  box-shadow: 0 0 40px currentColor;
}
#victory-panel h1 {
  font-family: var(--font-serif);
  font-size: 48px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 8px;
}
#victory-panel .meta {
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.hidden { display: none !important; }

/* ---------------- MOBILE RESPONSIVE ---------------- */

/* Global: prevent overscroll bounce on iOS, smooth touch targets */
html, body { overscroll-behavior: none; }
button, input[type=checkbox], input[type=range], select, .btn, .card-chip, .node-group, #sidebar-tabs button {
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(217, 119, 6, 0.2);
}

/* Hidden-on-desktop helper (todo 19) */
.hidden-desktop { display: none; }

/* Sidebar tab bar — default desktop = hidden */
#sidebar-tabs {
  display: none;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid var(--divider);
  flex-shrink: 0;
}
#sidebar-tabs button {
  flex: 1;
  padding: 14px 4px;
  background: transparent;
  color: var(--text-2);
  border: none;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  min-height: 44px;
}
#sidebar-tabs button.active {
  color: var(--amber);
  border-bottom-color: var(--amber);
}

/* Phone-sized layouts: < 900px */
@media (max-width: 899px) {
  /* Flip shell to column: map on top, sidebar below (todo 2) */
  #app {
    flex-direction: column;
    padding-top: env(safe-area-inset-top, 0);
  }
  #map-area {
    flex: 0 0 58vh;
    width: 100vw;
    min-height: 300px;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y pinch-zoom;
  }
  #map-svg {
    width: 100%;
    height: 100%;
    touch-action: pan-x pan-y pinch-zoom;
  }
  #sidebar {
    width: 100vw;
    min-width: 0;
    height: 42vh;
    border-left: none;
    border-top: 1px solid var(--panel-border);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  /* Tabs: show on mobile (todo 3) */
  .hidden-desktop { display: flex; }
  #sidebar-tabs { display: flex; }

  /* Hide game-title on phone to save vertical space; keep for screen readers */
  #game-title { display: none; }

  /* Only show the active tab's panel-section */
  #sidebar .panel-section[data-tab]:not(.active-tab) { display: none; }

  /* Log scroll must still work inside its parent (todo 16 / item 16) */
  #log-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  #log-list { overflow-y: auto; flex: 1; }

  /* Font size bumps (todo 8) */
  #log-list { font-size: 13px; line-height: 1.6; }
  .stat-row { font-size: 13px; }
  .stat-row .lbl { font-size: 11px; }
  .stat-row .val { font-size: 15px; }
  #phase-label { font-size: 22px; }
  #phase-help { font-size: 12px; }
  .roster-row { font-size: 12px; }
  .sel-display { font-size: 12px; }
  #turn-info .name { font-size: 15px; }

  /* Tap targets everywhere (todo 7) */
  .btn { padding: 12px 18px; font-size: 12px; min-height: 44px; }
  .card-chip {
    padding: 8px 12px;
    font-size: 12px;
    min-height: 40px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
  }
  .card-list { gap: 6px; }
  .player-slot select, .player-slot input,
  .setup-row select, .setup-row input {
    padding: 10px 12px; font-size: 14px; min-height: 40px;
  }
  input[type=checkbox] { width: 24px; height: 24px; }

  /* Dice: wrap + compact (todo 10) */
  .dice-row { flex-wrap: wrap; justify-content: center; }
  .die { width: 44px; height: 44px; padding: 5px; }
  .die .pip { width: 5px; height: 5px; }

/* =========================================================================
   KYZLO MODULE REGISTRY — Hooks, Scoring, Decision, RenderExt

// ── Shared hook registry ─────────────────────────────────────────────
const Hooks = (() => {
  const bus = {};
  const inFlight = new Set();
  return {
    on(event, fn) { (bus[event] ||= []).push(fn); },
    emit(event, payload) {
      if (!bus[event]) return;
      if (inFlight.has(event)) return; // depth guard
      inFlight.add(event);
      try {
        for (const fn of bus[event]) {
          try { fn(payload); } catch (e) { console.error(`[${event}]`, e); }
        }
      } finally { inFlight.delete(event); }
    },
  };
})();

// ── Shared scoring registry ──────────────────────────────────────────
const Scoring = (() => {
  const reinforceMods = [];
  const attackMods = [];
  const fortifyMods = [];
  return {
    addReinforceModifier(fn) { reinforceMods.push(fn); },
    addAttackModifier(fn) { attackMods.push(fn); },
    addFortifyModifier(fn) { fortifyMods.push(fn); },
    applyReinforce(name, player, base) {
      if (!player) return base;
      return reinforceMods.reduce((s, fn) => s + (fn(name, player, s) || 0), base);
    },
    applyAttack(src, tgt, player, base) {
      if (!player) return base;
      return attackMods.reduce((s, fn) => s + (fn(src, tgt, player, s) || 0), base);
    },
    applyFortify(src, tgt, player, base) {
      if (!player) return base;
      return fortifyMods.reduce((s, fn) => s + (fn(src, tgt, player, s) || 0), base);
    },
  };
})();

// ── Decision picker: defaults to argmax; Personality module overrides ──
const Decision = (() => {
  let pickFn = (options) => {
    if (!options.length) return null;
    options.sort((a, b) => b.score - a.score);
    return options[0];
  };
  return {
    setPicker(fn) { pickFn = fn; },
    pick(options, ctx) { return pickFn(options, ctx); },
  };
})();

// ── Render extension registries ──────────────────────────────────────

  const rosterBadges = [];
  const mapOverlays = [];

    addRosterBadge(fn) { rosterBadges.push(fn); },

    overlays(svg) { for (const fn of mapOverlays) { try { fn(svg); } catch(e){} } },
    filterLog(msg, ctx) {
      return logFilters.reduce((m, fn) => { try { return fn(m, ctx) ?? m; } catch(e){ return m; } }, msg);
    },
  };
})();

/* =========================================================================
   PERSONA — WEIGHTED SCORING + SOFTMAX DECISION (Spec 03)
   ========================================================================= */
const Persona = {
  attach(player, archId) {
    const arch = Arch.get(archId);
    player.personality = arch;
    player.runtimeWeights = arch ? JSON.parse(JSON.stringify(arch.weights)) : null;
    player.runtimeTemperature = arch ? arch.temperature : 1.0;
    player.regretTempAccum = 0;
    player.mood = arch?.mood?.default || "neutral";
  },
  w(player, path) {
    if (!player || !player.runtimeWeights) return 1.0;
    const parts = path.split(".");
    let cur = player.runtimeWeights;
    for (const p of parts) { cur = cur?.[p]; if (cur == null) return 1.0; }
    return typeof cur === "number" ? cur : 1.0;
  },
  temperature(player) {
    if (!player || !player.personality) return 1.0;
    const base = player.runtimeTemperature ?? player.personality.temperature;
    return Math.max(0.1, base);
  },
  mistakeRate(player, turn) {
    if (!player || !player.personality) return 0;
    if (player._mercyMistakeRate != null) return player._mercyMistakeRate;
    const r = player.personality;
    return Math.min(0.5, Math.max(0, r.mistakeRate + r.fatigueRate * ((turn||1) - 1)));
  },
};

Decision.setPicker((options, ctx) => {
  if (!options.length) return null;
  const player = ctx?.player;
  if (!player || !player.personality) {
    options.sort((a, b) => b.score - a.score);
    return options[0];
  }
  const r = Persona.mistakeRate(player, state?.turn ?? 1);
  if (Math.random() < r) {
    const top = options.slice().sort((a, b) => b.score - a.score).slice(0, 5);
    return top[Math.floor(Math.random() * top.length)];
  }
  const T = Persona.temperature(player);
  const maxScore = Math.max(...options.map(o => o.score));
  const weights = options.map(o => Math.exp((o.score - maxScore) / T));
  const sum = weights.reduce((a, b) => a + b, 0);
  if (sum === 0 || !isFinite(sum)) {
    options.sort((a, b) => b.score - a.score);
    return options[0];
  }
  let rr = Math.random() * sum;
  for (let i = 0; i < options.length; i++) {
    rr -= weights[i];
    if (rr <= 0) return options[i];
  }
  return options[options.length - 1];
});

    const pack = packs[archId];
    if (!pack || !pack[category]) return null;
    const arr = pack[category];
    return arr[Math.floor(Math.random() * arr.length)];
  }
  function fill(template, vars) {
    return template.replace(/\{(\w+)\}/g, (_, k) => (vars && vars[k] != null) ? vars[k] : "");
  }

  return {
    translate(msg, ctx) {
      if (!ctx || !ctx.player?.personality?.id) return msg;
      const t = pick(ctx.player.personality.id, ctx.category);
      if (!t) return msg;
      return fill(t, ctx.vars || {});
    },
    declareIntent(player, plan) {
      if (!player?.personality?.id) return null;
      const category = plan.kind === "aggressive" ? "intent_aggressive" : "intent_defensive";
      const t = pick(player.personality.id, category);
      if (!t) return null;
      return fill(t, {
        source: plan.primary?.source || "",
        target: plan.primary?.target || "",
        reinforceFocus: plan.reinforceFocus || "",
      });
    },
    reactToOutcome(player, plan, outcome) {
      if (!player?.personality?.id) return null;
      const t = pick(player.personality.id, "outcome_" + outcome);
      if (!t) return null;
      return fill(t, {
        source: plan.primary?.source || "",
        target: plan.primary?.target || "",
      });
    },
  };
})();

/* =========================================================================
   REPUTATION (Spec 09)
   ========================================================================= */
const Rep = (() => {
  const DECAY = 0.02;
  const ATTACK_COST = 0.25;
  const ELIMINATE_BONUS = 1.0;
  const PEACE_GROWTH = 0.05;

  function ensureMatrix() {
    if (!state) return;
    if (!state.reputation) state.reputation = {};
    for (const a of state.players) {
      state.reputation[a.id] = state.reputation[a.id] || {};
      for (const b of state.players) {
        if (a.id === b.id) continue;
        if (state.reputation[a.id][b.id] == null) {
          state.reputation[a.id][b.id] = a.isAI && !b.isAI ? -0.15 : 0;
        }
      }
    }
  }
  function clamp(v) { return Math.max(-1, Math.min(1, v)); }
  function adjacentToAny(observerId, targetId) {
    for (const name of TERR_ORDER) {
      const t = state.territories[name];
      if (t.owner !== observerId) continue;
      for (const adj of t.adj) {
        if (state.territories[adj].owner === targetId) return true;
      }
    }
    return false;
  }
  return {
    init() { ensureMatrix(); },
    onAttack(attackerId, defenderId) {
      ensureMatrix();
      const cur = state.reputation[attackerId][defenderId] ?? 0;
      state.reputation[attackerId][defenderId] = clamp(cur - ATTACK_COST);
      const cur2 = state.reputation[defenderId][attackerId] ?? 0;
      state.reputation[defenderId][attackerId] = clamp(cur2 - ATTACK_COST * 1.2);
    },
    onEliminate(attackerId, defenderId) {
      ensureMatrix();
      const cur = state.reputation[attackerId][defenderId] ?? 0;
      state.reputation[attackerId][defenderId] = clamp(cur - ELIMINATE_BONUS);
      for (const p of state.players) {
        if (p.id === attackerId || p.eliminated) continue;
        if (adjacentToAny(p.id, attackerId)) {
          const c = state.reputation[p.id][attackerId] ?? 0;
          state.reputation[p.id][attackerId] = clamp(c - 0.1);
        }
      }
    },
    tick() {
      ensureMatrix();
      for (const a of state.players) {
        if (a.eliminated) continue;
        for (const b of state.players) {
          if (a.id === b.id || b.eliminated) continue;
          let r = state.reputation[a.id][b.id] ?? 0;
          r = r > 0 ? Math.max(0, r - DECAY) : Math.min(0, r + DECAY);
          if (adjacentToAny(a.id, b.id)) r = clamp(r + PEACE_GROWTH);
          state.reputation[a.id][b.id] = r;
        }
      }
    },
    get(observerId, targetId) {
      return state?.reputation?.[observerId]?.[targetId] ?? 0;
    },
    symbol(observerId, targetId) {
      const r = Rep.get(observerId, targetId);
      if (r > 0.5) return "★";
      if (r > 0.15) return "·";
      if (r > -0.15) return "—";
      if (r > -0.5) return "·";
      return "×";
    },
  };
})();

/* =========================================================================
   GRUDGE MEMORY (Spec 10)
   ========================================================================= */
const Grudge = (() => {
  const DECAY_PER_TURN = 0.25;
  const TERRITORY_LOST = 1.0;
  const ARMY_LOST = 0.05;
  const MIN_ACTIVE = 0.1;
  return {
    record(victim, attackerId, armyLosses, territoryLost) {
      if (!victim) return;
      if (!victim.grudges) victim.grudges = {};
      const g = victim.grudges[attackerId] || { severity: 0, turn: state.turn };
      g.severity += armyLosses * ARMY_LOST + (territoryLost ? TERRITORY_LOST : 0);
      g.turn = state.turn;
      victim.grudges[attackerId] = g;
    },
    severity(player, attackerId) {
      const g = player?.grudges?.[attackerId];
      return g ? g.severity : 0;
    },
    tick() {
      for (const p of state.players) {
        if (!p.grudges) continue;
        for (const aid of Object.keys(p.grudges)) {
          p.grudges[aid].severity *= (1 - DECAY_PER_TURN);
          if (p.grudges[aid].severity < MIN_ACTIVE) delete p.grudges[aid];
        }
      }
    },
  };
})();

/* =========================================================================
   CAMPAIGN GOALS (Spec 11)
   ========================================================================= */
const Goal = (() => {
  const GoalTypes = {
    HOLD_CONTINENT: "hold-continent",
    ELIMINATE_FIRST: "eliminate-first",
    SURVIVE_WITH: "survive-with",
    BREAK_BONUSES: "break-bonuses",
    CAPTURE_CAPITAL: "capture-capital",
  };
  function randomContinent() {
    const ids = Object.keys(CONTINENTS);
    return ids[Math.floor(Math.random() * ids.length)];
  }
  function assign(player) {
    if (!player.personality) return null;
    const bias = player.personality.goalBias;
    const cont = player.personality.preferredContinent || randomContinent();
    switch (bias) {
      case "holdContinent":
        return { type: GoalTypes.HOLD_CONTINENT, params: { continent: cont, byTurn: 10 + Math.floor(Math.random() * 5) } };
      case "eliminateFirst":
        return { type: GoalTypes.ELIMINATE_FIRST, params: {} };
      case "survive":
        return { type: GoalTypes.SURVIVE_WITH, params: { turn: 15, minTerritories: 8 + Math.floor(Math.random() * 4) } };
      case "breakBonuses":
        return { type: GoalTypes.BREAK_BONUSES, params: { count: 2 + Math.floor(Math.random() * 2) } };
      default: {
        const roll = Math.random();
        if (roll < 0.4) return { type: GoalTypes.HOLD_CONTINENT, params: { continent: cont, byTurn: 12 } };
        if (roll < 0.7) return { type: GoalTypes.SURVIVE_WITH, params: { turn: 12, minTerritories: 10 } };
        return { type: GoalTypes.ELIMINATE_FIRST, params: {} };
      }
    }
  }
  function progress(player) {
    if (!player.goal) return 0;
    const g = player.goal;
    switch (g.type) {
      case GoalTypes.HOLD_CONTINENT: {
        const ts = TERR_ORDER.filter(n => state.territories[n].continent === g.params.continent);
        const owned = ts.filter(n => state.territories[n].owner === player.id).length;
        return owned / ts.length;
      }
      case GoalTypes.ELIMINATE_FIRST:
        return state.players.some(p => p.eliminated) ? 1.0 : 0;
      case GoalTypes.SURVIVE_WITH: {
        const t = state.turn;
        const owned = ownedBy(player.id).length;
        return Math.min(1, t / g.params.turn) * Math.min(1, owned / g.params.minTerritories);
      }
      case GoalTypes.BREAK_BONUSES:
        return Math.min(1, (player.goalProgress || 0) / g.params.count);
      case GoalTypes.CAPTURE_CAPITAL:
        return state.territories[g.params.territory]?.owner === player.id ? 1 : 0;
    }
    return 0;
  }
  function isComplete(player) {
    if (!player.goal) return false;
    const g = player.goal;
    if (g.type === GoalTypes.HOLD_CONTINENT) return progress(player) >= 1 && state.turn <= g.params.byTurn;
    if (g.type === GoalTypes.SURVIVE_WITH) return state.turn >= g.params.turn && ownedBy(player.id).length >= g.params.minTerritories;
    return progress(player) >= 1;
  }
  return {
    GoalTypes,
    assignToAll() {
      for (const p of state.players) {
        if (p.isAI && p.personality) {
          p.goal = assign(p);
          p.goalProgress = 0;
        }
      }
    },
    progress, isComplete,
    bonus(player, action) {
      if (!player.goal) return 0;
      const g = player.goal;
      const w = player.personality?.weights?.goalWeight ?? 0.5;
      if (action.kind === "attack") {
        if (g.type === GoalTypes.HOLD_CONTINENT) {
          const tgtCont = state.territories[action.target].continent;
          if (tgtCont === g.params.continent) return 25 * w;
        }
        if (g.type === GoalTypes.ELIMINATE_FIRST) {
          const opp = playerById(state.territories[action.target].owner);
          if (opp && ownedBy(opp.id).length <= 2) return 35 * w;
        }
        if (g.type === GoalTypes.BREAK_BONUSES) {
          const tgtCont = state.territories[action.target].continent;
          const contTerrs = TERR_ORDER.filter(n => state.territories[n].continent === tgtCont);
          const defenderId = state.territories[action.target].owner;
          if (defenderId != null && contTerrs.every(n => state.territories[n].owner === defenderId)) {
            return 30 * w;
          }
        }
        if (g.type === GoalTypes.CAPTURE_CAPITAL && action.target === g.params.territory) return 50 * w;
      }
      if (action.kind === "reinforce") {
        if (g.type === GoalTypes.HOLD_CONTINENT) {
          const t = state.territories[action.name];
          if (t.continent === g.params.continent) return 10 * w;
        }
        if (g.type === GoalTypes.SURVIVE_WITH) {
          const t = state.territories[action.name];
          const enemyCount = t.adj.filter(a => state.territories[a].owner !== player.id).length;
          if (enemyCount > 1) return 8 * w;
        }
      }
      return 0;
    },
    onCapture(attacker, srcName, tgtName) {
      if (!attacker?.goal || attacker.goal.type !== GoalTypes.BREAK_BONUSES) return;
      // If the continent now has more than one owner, we broke a bonus
      const tgtCont = state.territories[tgtName].continent;
      const contTerrs = TERR_ORDER.filter(n => state.territories[n].continent === tgtCont);
      const owners = new Set(contTerrs.map(n => state.territories[n].owner));
      if (owners.size > 1) {
        attacker.goalProgress = (attacker.goalProgress || 0) + 1;
      }
    },
  };
})();

/* =========================================================================
   PLAN — TELEGRAPHED INTENT (Spec 12)
   ========================================================================= */
const Plan = (() => {
  function compose(player) {
    if (!player.isAI || !player.personality) return null;
    const options = [];
    for (const src of ownedBy(player.id)) {
      const sT = state.territories[src];
      if (sT.armies < 3) continue;
      for (const adj of sT.adj) {
        if (state.territories[adj].owner !== player.id) {
          const s = scoreAttack(src, adj, player);
          options.push({ source: src, target: adj, score: s });
        }
      }
    }
    options.sort((a, b) => b.score - a.score);
    const primary = options[0];
    const owned = ownedBy(player.id);
    const reinforcePicks = owned.map(n => ({ name: n, score: scoreReinforceTerritory(n, player) }));
    reinforcePicks.sort((a, b) => b.score - a.score);
    const reinforceFocus = reinforcePicks[0]?.name;
    return {
      kind: primary?.score > 0 ? "aggressive" : "defensive",
      primary, reinforceFocus, turn: state.turn,
    };
  }
  function evaluate(player) {
    const plan = player.currentPlan;
    if (!plan || !plan.primary) return "neutral";
    const t = state.territories[plan.primary.target];
    if (!t) return "neutral";
    const ownedNow = t.owner === player.id;
    const src = state.territories[plan.primary.source];
    const hasLostSource = src && src.armies < 2;
    if (ownedNow) return "success";
    if (hasLostSource) return "disaster";
    return "thwarted";
  }
  return { compose, evaluate };
})();

      return state.turn <= b.booksExpireAfterTurn;
    },
    claimScore(player, name) {
      const b = Book.forPlayer(player);
      return b ? Math.min(50, b.claimPreference(name) || 0) : 0;
    },
    reinforceBonus(player, name) {
      const b = Book.forPlayer(player);
      if (!b || !Book.active(player)) return 0;
      const idx = b.reinforceFocus.indexOf(name);
      if (idx < 0) return 0;
      return 30 - idx * 5;
    },
    attackBonus(player, target) {
      const b = Book.forPlayer(player);
      if (!b || !Book.active(player)) return 0;
      return b.earlyAttackPriority.includes(target) ? 15 : 0;
    },
  };
})();

/* =========================================================================
   RULE — MECHANICAL ASYMMETRY (Spec 16)
   ========================================================================= */
const Rule = {
  mod(player, key) {
    return player?.personality?.ruleMods?.[key];
  },
  reinforceBonus(player) {
    const base = Rule.mod(player, "reinforceBonus") || 0;
    const lossPerAttack = Rule.mod(player, "reinforceLossPerAttack") || 0;
    const attacksLastTurn = player?._attackedLastTurn || 0;
    return base - lossPerAttack * attacksLastTurn;
  },
  canAttack(player, srcName) {
    const minStack = Rule.mod(player, "minAttackStack");
    if (minStack != null && state.territories[srcName].armies < minStack) return false;
    const noBefore = Rule.mod(player, "noAttackBeforeTurn");
    if (noBefore != null && state.turn < noBefore) return false;
    return true;
  },
  rerollAtkDie(player, atkDice, defDice) {
    if (!Rule.mod(player, "rerollOneLoss")) return atkDice;
    const a = atkDice.slice().sort((x, y) => y - x);
    const d = defDice.slice().sort((x, y) => y - x);
    for (let i = 0; i < Math.min(a.length, d.length); i++) {
      if (a[i] <= d[i]) {
        const newRoll = 1 + Math.floor(Math.random() * 6);
        if (newRoll > a[i]) { a[i] = newRoll; return a.sort((x,y)=>y-x); }
        break;
      }
    }
    return a;
  },
};

/* =========================================================================
   REGRET — IN-GAME LEARNING (Spec 06)
   ========================================================================= */
const Regret = (() => {
  const EXPECTED_LOSS = {
    "1,1": { atkLoss: 0.583, defLoss: 0.417 },
    "2,1": { atkLoss: 0.421, defLoss: 0.579 },
    "3,1": { atkLoss: 0.340, defLoss: 0.660 },
    "1,2": { atkLoss: 0.745, defLoss: 0.255 },
    "2,2": { atkLoss: 0.896, defLoss: 1.104 },
    "3,2": { atkLoss: 0.742, defLoss: 1.258 },
  };
  function expected(atk, def) {
    return EXPECTED_LOSS[`${atk},${def}`] || { atkLoss: 1, defLoss: 1 };
  }
  return {
    update(player, atkDiceCount, defDiceCount, actualAtkLoss, actualDefLoss) {
      if (!player.personality || !player.runtimeWeights) return;
      const exp = expected(atkDiceCount, defDiceCount);
      const atkRegret = actualAtkLoss - exp.atkLoss;
      const defShortfall = exp.defLoss - actualDefLoss;
      const la = player.personality.lossAversion || 1.0;
      const combined = atkRegret * la + defShortfall * 0.5;
      const w = player.runtimeWeights.attack;
      const baseW = player.personality.weights.attack;
      w.hopelessPenalty = _clampNum(w.hopelessPenalty + 0.05 * combined, baseW.hopelessPenalty * 0.7, baseW.hopelessPenalty * 1.6);
      w.armyAdvantage = _clampNum(w.armyAdvantage - 0.03 * combined, baseW.armyAdvantage * 0.6, baseW.armyAdvantage * 1.4);
      // Nudge temperature via accumulator (Band reads this)
      const baseT = player.personality.temperature;
      player.regretTempAccum = _clampNum((player.regretTempAccum || 0) + 0.04 * -combined, -baseT * 0.5, baseT * 0.6);
    },
    reset(player) {
      if (!player.personality) return;
      player.runtimeWeights = JSON.parse(JSON.stringify(player.personality.weights));
      player.runtimeTemperature = player.personality.temperature;
      player.regretTempAccum = 0;
    },
  };
})();

/* =========================================================================
   BAND — RUBBER-BAND TEMPERATURE (Spec 07)
   ========================================================================= */
const Band = (() => {
  function standing(player) {
    if (player.eliminated) return -1;
    const alive = state.players.filter(p => !p.eliminated);
    if (alive.length <= 1) return 0;
    const myT = ownedBy(player.id).length;
    const totalT = TERR_ORDER.length;
    const avgT = totalT / alive.length;
    const myA = TERR_ORDER.reduce((s, n) => s + (state.territories[n].owner === player.id ? state.territories[n].armies : 0), 0);
    const totalA = TERR_ORDER.reduce((s, n) => s + state.territories[n].armies, 0);
    const avgA = totalA / alive.length;
    const myC = ownedContinents(player.id).reduce((s, c) => s + CONTINENTS[c].bonus, 0);
    const totalC = Object.keys(CONTINENTS).reduce((s, c) => s + CONTINENTS[c].bonus, 0);
    const avgC = totalC / alive.length;
    const tD = avgT > 0 ? (myT - avgT) / avgT : 0;
    const aD = avgA > 0 ? (myA - avgA) / avgA : 0;
    const cD = avgC > 0 ? (myC - avgC) / avgC : 0;
    return Math.max(-1, Math.min(1, 0.4 * tD + 0.4 * aD + 0.2 * cD));
  }
  return {
    recalibrate() {
      if (!state) return;
      for (const p of state.players) {
        if (!p.personality || p.eliminated) continue;
        const s = standing(p);
        const baseT = p.personality.temperature;
        const rb = p.personality.rubberBand || { leaderBonus: 0, trailerBonus: 0 };
        let delta = s > 0 ? rb.leaderBonus * s : rb.trailerBonus * -s;
        p.runtimeTemperature = Math.max(0.1, baseT + delta + (p.regretTempAccum || 0));
      }
    },
    standing,
  };
})();

/* =========================================================================
   PERSIST — META (Spec 17)
   ========================================================================= */
const Persist = (() => {
  const ENABLED_KEY = "rg.enabled";
  const ARCH_KEY = "rg.archStats";
  const PLAYER_KEY = "rg.playerStats";
  const LAST_KEY = "rg.lastGame";
  function enabled() { try { return localStorage.getItem(ENABLED_KEY) === "true"; } catch(e){ return false; } }
  function read(key, fb) { try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fb; } catch(e){ return fb; } }
  function write(key, v) { try { localStorage.setItem(key, JSON.stringify(v)); } catch(e){} }
  return {
    isEnabled: enabled,
    setEnabled(v) { try { localStorage.setItem(ENABLED_KEY, v ? "true" : "false"); } catch(e){} },
    recordGame(winner, players) {
      if (!enabled()) return;
      const archStats = read(ARCH_KEY, {});
      const playerStats = read(PLAYER_KEY, {});
      for (const p of players) {
        const archId = p.personality?.id;
        if (archId) {
          archStats[archId] = archStats[archId] || { wins: 0, losses: 0, games: 0 };
          archStats[archId].games++;
          if (p.id === winner.id) archStats[archId].wins++; else archStats[archId].losses++;
        }
        if (!p.isAI) {
          const pname = p.name;
          playerStats[pname] = playerStats[pname] || { vs: {} };
          for (const opp of players) {
            if (opp.id === p.id) continue;
            const oppArch = opp.personality?.id;
            if (!oppArch) continue;
            playerStats[pname].vs[oppArch] = playerStats[pname].vs[oppArch] || { wins: 0, losses: 0 };
            if (p.id === winner.id) playerStats[pname].vs[oppArch].wins++;
            else if (opp.id === winner.id) playerStats[pname].vs[oppArch].losses++;
          }
        }
      }
      write(ARCH_KEY, archStats);
      write(PLAYER_KEY, playerStats);
      write(LAST_KEY, {
        timestamp: Date.now(),
        players: players.map(p => ({ name: p.name, archId: p.personality?.id || null })),
        winner: winner.name,
      });
    },
    record(playerName, archId) {
      const ps = read(PLAYER_KEY, {});
      return ps[playerName]?.vs?.[archId] || { wins: 0, losses: 0 };
    },
    lastGame() { return read(LAST_KEY, null); },
    leaderboard() {
      const archStats = read(ARCH_KEY, {});
      return Object.entries(archStats).map(([id,s]) => ({ id, ...s, winRate: s.games ? s.wins / s.games : 0 })).sort((a,b)=>b.winRate-a.winRate);
    },
  };
})();

/* =========================================================================
   SAVE/LOAD — Local game snapshot
   ========================================================================= */
const SaveLoad = (() => {
  const KEY = "rg.savedGame";
  const VERSION = 1;
  function serialize(st) {
    const snap = {
      __version: VERSION,
      savedAt: Date.now(),
      phase: st.phase,
      turn: st.turn,
      currentPlayerIdx: st.currentPlayerIdx,
      players: st.players.map(p => ({
        id: p.id,
        name: p.name,
        color: p.color,
        isAI: p.isAI,
        archId: p.personality?.id ?? p.archId ?? null,
        armies: p.armies,
        cards: p.cards,
        eliminated: p.eliminated,
        runtimeWeights: p.runtimeWeights,
        runtimeTemperature: p.runtimeTemperature,
        regretTempAccum: p.regretTempAccum,
        mood: p.mood,
        grudges: p.grudges,
        goal: p.goal,
        goalProgress: p.goalProgress,
        openingBook: p.openingBook,
        ruleMods: p.ruleMods,
        _attackedThisTurn: p._attackedThisTurn,
        _attackedLastTurn: p._attackedLastTurn,
      })),
      territories: st.territories,
      deck: st.deck,
      discard: st.discard,
      setsTradedGlobal: st.setsTradedGlobal,
      conqueredThisTurn: st.conqueredThisTurn,
      fortifyUsed: st.fortifyUsed,
      pendingReinforcements: st.pendingReinforcements,
      selected: st.selected,
      selectedCards: st.selectedCards,
      log: st.log,
      pendingAttack: st.pendingAttack,
      pendingMove: st.pendingMove,
      lastDice: st.lastDice,
      midAttackPlacement: st.midAttackPlacement,
      reputation: st.reputation,
      observations: st.observations,
      uiAlerts: st.uiAlerts,
    };
    return JSON.stringify(snap);
  }
  function deserialize(raw) {
    const data = JSON.parse(raw);
    for (const p of data.players) {
      p.personality = Arch.get(p.archId);
      p.currentPlan = null;
      p.grudges = p.grudges || {};
      p.ruleMods = p.ruleMods || {};
    }
    return data;
  }
  return {
    save(st) {
      if (!st) return false;
      if (st.phase === "victory" || st.phase === "setup-claim") return false;
      if (st.midAttackPlacement) return false;
      try { localStorage.setItem(KEY, serialize(st)); return true; } catch(e) { return false; }
    },
    load() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return null;
        return deserialize(raw);
      } catch(e) { return null; }
    },
    has() {
      try { return !!localStorage.getItem(KEY); } catch(e) { return false; }
    },
    info() {
      try {
        const raw = localStorage.getItem(KEY);
        if (!raw) return null;
        const d = JSON.parse(raw);
        return { savedAt: d.savedAt, turn: d.turn, phase: d.phase, players: d.players.map(p => p.name) };
      } catch(e) { return null; }
    },
    clear() { try { localStorage.removeItem(KEY); } catch(e){} },
  };
})();

/* =========================================================================
   HOOK SUBSCRIPTIONS (wire up behavioral modules)
   ========================================================================= */
Hooks.on("gameStart", ({ players }) => {
  players.forEach(p => { p.grudges = {}; });
  try { Rep.init(); } catch(e){}
  try { Goal.assignToAll(); } catch(e){}
});
Hooks.on("turnStart", ({ player }) => {
  try { Grudge.tick(); } catch(e){}
  try { Rep.tick(); } catch(e){}
  try { Band.recalibrate(); } catch(e){}
  if (player) {
    player._attackedLastTurn = player._attackedThisTurn || 0;
    player._attackedThisTurn = 0;
  }
  if (player && player.isAI && player.personality) {
    try {
      player.currentPlan = Plan.compose(player);
      if (player.currentPlan) {
        const decl = Voice.declareIntent(player, player.currentPlan);
        if (decl) log(`<span class="intent-mark">▸</span> ${decl}`);
      }
    } catch(e){}
  }
});
Hooks.on("turnEnd", ({ player }) => {
  if (!player || !player.isAI || !player.personality || !player.currentPlan) return;
  try {
    const outcome = Plan.evaluate(player);
    const reaction = Voice.reactToOutcome(player, player.currentPlan, outcome);
    if (reaction) log(`<span style="color:var(--text-3)">◂</span> ${reaction}`);
  } catch(e){}
  player.currentPlan = null;
});
Hooks.on("attack", ({ attacker, defender, atkDice, defDice, atkLost, defLost, captured }) => {
  if (attacker && defender) {
    try { Grudge.record(defender, attacker.id, defLost, captured); } catch(e){}
    try { Rep.onAttack(attacker.id, defender.id); } catch(e){}
    if (defender) defender._attackedThisTurn = (defender._attackedThisTurn || 0) + 1;
  }
  if (attacker && attacker.isAI && attacker.personality) {
    try { Regret.update(attacker, atkDice.length, defDice.length, atkLost, defLost); } catch(e){}
    Mood.record(attacker, captured ? "captured" : (atkLost > defLost ? "lost" : "won"));
  }
  if (defender?.personality) Mood.record(defender, "attacked");
});
Hooks.on("capture", ({ attacker, source, target }) => {
  try { Goal.onCapture(attacker, source, target); } catch(e){}
  try { Band.recalibrate(); } catch(e){}
});
Hooks.on("eliminate", ({ attacker, defender }) => {
  try { Rep.onEliminate(attacker.id, defender.id); } catch(e){}
  if (attacker?.grudges?.[defender.id]) attacker.grudges[defender.id].severity *= 0.3;
  if (attacker?.personality) Mood.record(attacker, "captured");
});

// Score modifiers
Scoring.addAttackModifier((src, tgt, player) => {
  const defenderId = state.territories[tgt].owner;
  if (defenderId == null) return 0;
  const sev = Grudge.severity(player, defenderId);
  const w = player.personality?.weights?.grudge ?? 0;
  return 8 * sev * w;
});
Scoring.addAttackModifier((src, tgt, player) => {
  const defenderId = state.territories[tgt].owner;
  if (defenderId == null) return 0;
  const r = Rep.get(player.id, defenderId);
  const w = player.personality?.weights?.reputation ?? 0.3;
  return -15 * r * w;
});
Scoring.addAttackModifier((src, tgt, player) => Goal.bonus(player, { kind: "attack", source: src, target: tgt }));
Scoring.addReinforceModifier((name, player) => Goal.bonus(player, { kind: "reinforce", name }));
Scoring.addReinforceModifier((name, player) => Book.reinforceBonus(player, name));
Scoring.addAttackModifier((src, tgt, player) => Book.attackBonus(player, tgt));

  const cp = currentPlayer();
  if (!cp || cp.id === p.id || !cp.isAI) return "";
  const sev = Grudge.severity(cp, p.id);
  if (sev < 0.5) return "";
  return `<span class="grudge-badge" title="grudge sev=${sev.toFixed(1)}">!</span>`;
});
RenderExt.addRosterBadge(p => {
  const cp = currentPlayer();
  if (!cp || cp.id === p.id) return "";
  const r = Rep.get(cp.id, p.id);
  if (Math.abs(r) < 0.15) return "";
  const color = r > 0 ? "var(--emerald)" : "var(--crimson)";
  return `<span class="rep-badge" style="color:${color};margin-left:4px">${Rep.symbol(cp.id, p.id)}</span>`;
});
RenderExt.addMapOverlay(svg => {
  const cp = currentPlayer();
  if (!cp?.personality) return;
  const SVG = "http://www.w3.org/2000/svg";
  if (cp.personality.id === "jackal") {
    const alive = state.players.filter(p => !p.eliminated && p.id !== cp.id);
    if (!alive.length) return;
    const weakest = alive.reduce((min, p) => ownedBy(p.id).length < ownedBy(min.id).length ? p : min, alive[0]);
    const wts = ownedBy(weakest.id);
    if (!wts.length) return;
    const low = wts.reduce((m, n) => state.territories[n].armies < state.territories[m].armies ? n : m, wts[0]);
    const t = state.territories[low];
    const mk = document.createElementNS(SVG, "text");
    mk.setAttribute("x", t.x); mk.setAttribute("y", t.y - 28);
    mk.setAttribute("text-anchor", "middle");
    mk.setAttribute("fill", "#d97706");
    mk.setAttribute("font-size", "14");
    mk.textContent = "◤";
    svg.appendChild(mk);
  }
  if (cp.personality.id === "fortress") {
    const owned = ownedBy(cp.id);
    if (!owned.length) return;
    const biggest = owned.reduce((m, n) => state.territories[n].armies > state.territories[m].armies ? n : m, owned[0]);
    const t = state.territories[biggest];
    if (t.armies >= 6) {
      const c = document.createElementNS(SVG, "circle");
      c.setAttribute("cx", t.x); c.setAttribute("cy", t.y);
      c.setAttribute("r", 28); c.setAttribute("fill", "none");
      c.setAttribute("stroke", "#475569"); c.setAttribute("stroke-width", "2");
      c.setAttribute("stroke-dasharray", "3 3"); c.setAttribute("opacity", "0.6");
      svg.appendChild(c);
    }
  }
  if (cp.personality.id === "vengeful" && cp.grudges) {
    let topId = null, topSev = 0;
    for (const [id, g] of Object.entries(cp.grudges)) {
      if (g.severity > topSev) { topSev = g.severity; topId = parseInt(id, 10); }
    }
    if (topId != null && topSev > 1) {
      const terrs = ownedBy(topId);
      if (terrs.length) {
        const weakest = terrs.reduce((m, n) => state.territories[n].armies < state.territories[m].armies ? n : m, terrs[0]);
        const t = state.territories[weakest];
        const r = document.createElementNS(SVG, "circle");
        r.setAttribute("cx", t.x); r.setAttribute("cy", t.y);
        r.setAttribute("r", 24); r.setAttribute("fill", "none");
        r.setAttribute("stroke", "#dc2626"); r.setAttribute("stroke-width", "2");
        r.setAttribute("opacity", "0.7");
        svg.appendChild(r);
      }
    }
  }
});

// Build undirected adjacency pair list for rendering lines
function buildAdjPairs() {
  const edgeKey = new Set(EDGE_EXIT_PAIRS.map(([a,b]) => [a,b].sort().join("|")));
  const pairs = [];
  const seen = new Set();
  for (const name of TERR_ORDER) {
    for (const other of TERR_DATA[name][3]) {
      const key = [name, other].sort().join("|");
      if (seen.has(key)) continue;
      seen.add(key);
      pairs.push({ a: name, b: other, edgeExit: edgeKey.has(key) });
    }
  }
  return pairs;
}
const ADJ_PAIRS = buildAdjPairs();

// Card types cycle

  deck.push({ territory: null, type: "Wild" });

}

function tweenNumber(el, from, to, duration) {
  const start = performance.now();
  const delta = to - from;
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    if (!el.isConnected) return; // element removed mid-tween
    el.textContent = Math.round(from + delta * eased);
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = to;
  }
  requestAnimationFrame(tick);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function rollDie() { return 1 + Math.floor(Math.random() * 6); }
function log(msg) {
  if (!state) return;
  // === MARKER: render-log-voice ===
  const filtered = RenderExt.filterLog(msg, { turn: state?.turn ?? 0 });
  state.log.push(filtered);
  if (state.log.length > 200) state.log.shift();
}
function toast(msg) {
  const div = document.createElement("div");
  div.className = "toast";
  div.textContent = msg;
  document.getElementById("toast-container").appendChild(div);
  setTimeout(() => div.remove(), 3000);
}
function currentPlayer() { return state.players[state.currentPlayerIdx]; }
function playerById(id) { return state.players.find(p => p.id === id); }
function ownedBy(pid) {
  return TERR_ORDER.filter(n => state.territories[n].owner === pid);
}
function continentOwnedBy(cont, pid) {
  const ts = TERR_ORDER.filter(n => state.territories[n].continent === cont);
  return ts.every(n => state.territories[n].owner === pid);
}
function ownedContinents(pid) {
  return Object.keys(CONTINENTS).filter(c => continentOwnedBy(c, pid));
}
function calcReinforcements(pid) {
  const owned = ownedBy(pid).length;
  const base = Math.max(3, Math.floor(owned / 3));
  const bonus = ownedContinents(pid).reduce((s, c) => s + CONTINENTS[c].bonus, 0);
  const player = playerById(pid);
  const ruleBonus = player ? Rule.reinforceBonus(player) : 0;
  return Math.max(1, base + bonus + ruleBonus);
}
function nextTradeValue(setsSoFar) {
  const table = [4, 6, 8, 10, 12, 15];
  if (setsSoFar < table.length) return table[setsSoFar];
  return 15 + (setsSoFar - 5) * 5; // index 6 → 20, 7 → 25, 8 → 30 …
}
function validSet(cards) {
  if (cards.length !== 3) return false;
  const wilds = cards.filter(c => c.type === "Wild").length;
  const nonWilds = cards.filter(c => c.type !== "Wild");
  if (wilds === 0) {
    const types = new Set(nonWilds.map(c => c.type));
    if (types.size === 1) return true; // 3 same
    if (types.size === 3) return true; // 1 of each
    return false;
  }
  // with ≥1 wild: need any 2 non-wilds (types don't matter — wild substitutes for either)
  if (wilds >= 1 && nonWilds.length + wilds === 3) return true;
  return false;
}
function findBestAISet(player) {
  const cards = player.cards;
  const ownedSet = new Set(ownedBy(player.id));
  // enumerate all 3-combos, pick valid set with most owned-territory matches
  let best = null, bestScore = -1;
  for (let i = 0; i < cards.length; i++) {
    for (let j = i+1; j < cards.length; j++) {
      for (let k = j+1; k < cards.length; k++) {
        const trio = [cards[i], cards[j], cards[k]];
        if (!validSet(trio)) continue;
        const matches = trio.filter(c => c.territory && ownedSet.has(c.territory)).length;
        if (matches > bestScore) {
          bestScore = matches;
          best = [i, j, k];
        }
      }
    }
  }
  return best; // indices into player.cards
}

const SVG_NS = "http://www.w3.org/2000/svg";

function renderMap() {
  const svg = document.getElementById("map-svg");
  svg.innerHTML = "";

  // 1. Continent halos (large soft blurred circles)
  const halosGroup = document.createElementNS(SVG_NS, "g");
  // Compute centroid + radius per continent
  for (const cKey of Object.keys(CONTINENTS)) {
    const ts = TERR_ORDER.filter(n => state.territories[n].continent === cKey);
    let cx = 0, cy = 0;
    ts.forEach(n => { cx += state.territories[n].x; cy += state.territories[n].y; });
    cx /= ts.length; cy /= ts.length;
    // radius: max distance from centroid
    let r = 0;
    ts.forEach(n => {
      const dx = state.territories[n].x - cx;
      const dy = state.territories[n].y - cy;
      r = Math.max(r, Math.hypot(dx, dy));
    });
    r += 45;
    const halo = document.createElementNS(SVG_NS, "circle");
    halo.setAttribute("cx", cx);
    halo.setAttribute("cy", cy);
    halo.setAttribute("r", r);
    halo.setAttribute("fill", CONTINENTS[cKey].color);
    halo.setAttribute("filter", "url(#halo-blur)");
    halosGroup.appendChild(halo);
  }

  // SVG filter for blur
  const defs = document.createElementNS(SVG_NS, "defs");
  defs.innerHTML = `
    <filter id="halo-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  `;
  svg.appendChild(defs);
  svg.appendChild(halosGroup);

  // 2. Continent labels
  for (const cKey of Object.keys(CONTINENTS)) {
    const c = CONTINENTS[cKey];
    const label = document.createElementNS(SVG_NS, "text");
    label.setAttribute("x", c.labelX);
    label.setAttribute("y", c.labelY);
    label.setAttribute("class", "continent-label");
    label.setAttribute("text-anchor", "middle");
    const ownedAll = continentOwnedBy(cKey, currentPlayer()?.id);
    label.textContent = c.name + "  +" + c.bonus;
    svg.appendChild(label);
  }

  // 3. Adjacency lines (behind nodes)
  const linesGroup = document.createElementNS(SVG_NS, "g");
  linesGroup.setAttribute("id", "adj-lines");
  for (const p of ADJ_PAIRS) {
    if (p.edgeExit) {
      // Draw two short dashed segments with arrows indicating pacific wrap
      const a = state.territories[p.a];
      const b = state.territories[p.b];
      // figure out which is "left" (smaller x) and which is "right"
      const left = a.x < b.x ? a : b;
      const right = a.x < b.x ? b : a;
      // left node exits toward x = -5, right node exits toward x = 1005
      const l1 = document.createElementNS(SVG_NS, "line");
      l1.setAttribute("x1", left.x); l1.setAttribute("y1", left.y);
      l1.setAttribute("x2", -5); l1.setAttribute("y2", left.y);
      l1.setAttribute("class", "adj-line dashed");
      l1.setAttribute("data-a", p.a);
      l1.setAttribute("data-b", p.b);
      linesGroup.appendChild(l1);
      const l2 = document.createElementNS(SVG_NS, "line");
      l2.setAttribute("x1", right.x); l2.setAttribute("y1", right.y);
      l2.setAttribute("x2", 1005); l2.setAttribute("y2", right.y);
      l2.setAttribute("class", "adj-line dashed");
      l2.setAttribute("data-a", p.a);
      l2.setAttribute("data-b", p.b);
      linesGroup.appendChild(l2);
      // arrow glyphs
      const arrL = document.createElementNS(SVG_NS, "polygon");
      arrL.setAttribute("points", `0,${left.y-5} -8,${left.y} 0,${left.y+5}`);
      arrL.setAttribute("class", "edge-arrow");
      linesGroup.appendChild(arrL);
      const arrR = document.createElementNS(SVG_NS, "polygon");
      arrR.setAttribute("points", `1000,${right.y-5} 1008,${right.y} 1000,${right.y+5}`);
      arrR.setAttribute("class", "edge-arrow");
      linesGroup.appendChild(arrR);
    } else {
      const a = state.territories[p.a];
      const b = state.territories[p.b];
      const line = document.createElementNS(SVG_NS, "line");
      line.setAttribute("x1", a.x); line.setAttribute("y1", a.y);
      line.setAttribute("x2", b.x); line.setAttribute("y2", b.y);
      line.setAttribute("class", "adj-line");
      line.setAttribute("data-a", p.a);
      line.setAttribute("data-b", p.b);
      linesGroup.appendChild(line);
    }
  }
  svg.appendChild(linesGroup);

  // 4. Territory nodes
  for (const name of TERR_ORDER) {
    const t = state.territories[name];
    const g = document.createElementNS(SVG_NS, "g");
    g.setAttribute("class", "node-group hoverable");
    g.setAttribute("data-name", name);
    g.setAttribute("transform", `translate(${t.x}, ${t.y})`);

    // Apply selection styling
    if (state.selected.source === name) g.classList.add("source");
    if (state.selected.target === name) g.classList.add("target");

    // Invisible touch halo — enlarges tap target for phones (mobile todo #4)
    const touchHalo = document.createElementNS(SVG_NS, "circle");
    touchHalo.setAttribute("cx", 0);
    touchHalo.setAttribute("cy", 0);
    touchHalo.setAttribute("r", 30);
    touchHalo.setAttribute("fill", "transparent");
    touchHalo.setAttribute("pointer-events", "all");
    touchHalo.setAttribute("class", "node-touch-halo");
    g.appendChild(touchHalo);

    const circle = document.createElementNS(SVG_NS, "circle");
    circle.setAttribute("cx", 0); circle.setAttribute("cy", 0);
    circle.setAttribute("r", 18);
    circle.setAttribute("class", "node-circle");
    if (t.owner == null) {
      circle.classList.add("neutral");
    } else {
      const player = playerById(t.owner);
      circle.setAttribute("fill", player.color);
      circle.setAttribute("stroke", "#fff");
    }
    g.appendChild(circle);

    // army count — tween if changed since last render
    const count = document.createElementNS(SVG_NS, "text");
    count.setAttribute("class", "node-label");
    count.setAttribute("x", 0); count.setAttribute("y", 1);
    const prev = lastArmiesShown.get(name);
    if (prev !== undefined && prev !== t.armies) {
      count.textContent = prev;
      g.appendChild(count);
      tweenNumber(count, prev, t.armies, 200);
    } else {
      count.textContent = t.armies;
      g.appendChild(count);
    }
    lastArmiesShown.set(name, t.armies);

    // territory name below
    const lbl = document.createElementNS(SVG_NS, "text");
    lbl.setAttribute("class", "node-name");
    lbl.setAttribute("x", 0); lbl.setAttribute("y", 32);
    lbl.textContent = name;
    g.appendChild(lbl);

    g.addEventListener("click", () => onTerritoryClick(name));
    svg.appendChild(g);
  }
  // === MARKER: render-map-overlay ===
  try { RenderExt.overlays(svg); } catch(e){}
}

function pulseAttackLine(fromName, toName) {
  const svg = document.getElementById("map-svg");
  const lines = svg.querySelectorAll("#adj-lines line");
  for (const line of lines) {
    const a = line.getAttribute("data-a"), b = line.getAttribute("data-b");
    if ((a === fromName && b === toName) || (a === toName && b === fromName)) {
      line.classList.remove("pulse");
      void line.getBoundingClientRect(); // reflow
      line.classList.add("pulse");
      setTimeout(() => line.classList.remove("pulse"), 700);
    }
  }
}

function renderRoster() {

    const row = document.createElement("div");
    row.className = "roster-row" + (idx === state.currentPlayerIdx ? " active" : "") + (p.eliminated ? " eliminated" : "");
    const archLabel = p.personality ? `<span style='color:${p.personality.color};font-weight:500;font-size:10px'> · ${p.personality.name}</span>` : "";
    row.innerHTML = `
      <span class="swatch" style="background:${p.color}"></span>
      <span class="pname">${p.name}${p.isAI ? " <span style='color:var(--text-3);font-weight:400'>(AI)</span>" : ""}${archLabel}</span>
      <span class="rstat" title="Territories">${tCount}⌂</span>
      <span class="rstat" title="Armies">${aCount}⚔</span>
      <span class="rstat" title="Cards">${p.cards.length}🂠</span>
      ${RenderExt.roster(p)}
    `;
    root.appendChild(row);
  });
}

function renderLog() {
  const list = document.getElementById("log-list");
  const entries = state.log.slice(-12);
  list.innerHTML = entries.map(e => `<div class="entry">${e}</div>`).join("");
  list.scrollTop = list.scrollHeight;
}

/* =========================================================================
   SETUP SCREEN
   ========================================================================= */

function renderSetupSlots() {
  const count = parseInt(document.getElementById("player-count").value, 10);
  const root = document.getElementById("player-slots");
  root.innerHTML = "";
  const classicMode = document.getElementById("classic-mode")?.checked || false;
  const humanName = "You";
  const archList = Arch.list();
  for (let i = 0; i < count; i++) {
    const slot = document.createElement("div");
    slot.className = "player-slot";
    const defaultName = i === 0 ? "You" : `AI ${i}`;
    const defaultRole = i === 0 ? "human" : "ai";
    const defaultArch = i === 0 ? "" : archList[(i - 1) % archList.length];
    // === MARKER: setup-ui-slots ===
    slot.innerHTML = `
      <div class="swatch" style="background:${PALETTE[i].color}"></div>
      <input type="text" class="p-name" data-slot="${i}" value="${defaultName}">
      <select class="p-role" data-slot="${i}">
        <option value="human" ${defaultRole==="human"?"selected":""}>Human</option>
        <option value="ai" ${defaultRole==="ai"?"selected":""}>AI</option>
      </select>
      <select class="p-arch" data-slot="${i}" ${defaultRole === "human" || classicMode ? "disabled" : ""}>
        <option value="">— Classic —</option>
        ${archList.map(id => {
          const a = Arch.get(id);
          const rec = Persist.isEnabled() ? Persist.record(humanName, id) : null;
          const label = rec && (rec.wins || rec.losses) ? `${a.name} (${rec.wins}W-${rec.losses}L)` : a.name;
          return `<option value="${id}" ${id === defaultArch ? "selected" : ""}>${label}</option>`;
        }).join("")}
      </select>
      <div class="arch-desc" data-slot="${i}"></div>
    `;
    root.appendChild(slot);
  }
  root.querySelectorAll(".p-arch").forEach(sel => {
    sel.addEventListener("change", () => updateArchDescription(sel));
    updateArchDescription(sel);
  });
  root.querySelectorAll(".p-role").forEach(sel => {
    sel.addEventListener("change", () => {
      const s = sel.dataset.slot;
      const archSel = root.querySelector(`.p-arch[data-slot="${s}"]`);
      const isHuman = sel.value === "human";
      const cm = document.getElementById("classic-mode")?.checked || false;
      if (archSel) {
        archSel.disabled = isHuman || cm;
        updateArchDescription(archSel);
      }
    });
  });
}

function updateArchDescription(archSelect) {
  const slot = archSelect.dataset.slot;
  const descEl = document.querySelector(`.arch-desc[data-slot="${slot}"]`);
  if (!descEl) return;
  const arch = Arch.get(archSelect.value);
  if (!arch || archSelect.disabled) {
    descEl.innerHTML = "";
  } else {
    let ruleHint = "";
    if (arch.ruleMods) {
      const rm = arch.ruleMods;
      const bits = [];
      if (rm.reinforceBonus) bits.push(`+${rm.reinforceBonus} reinforce`);
      if (rm.minAttackStack) bits.push(`min ${rm.minAttackStack} stack`);
      if (rm.noAttackBeforeTurn) bits.push(`no attack before T${rm.noAttackBeforeTurn}`);
      if (rm.rerollOneLoss) bits.push(`reroll`);
      if (bits.length) ruleHint = ` <span style="color:var(--crimson)">[${bits.join(", ")}]</span>`;
    }
    descEl.innerHTML = `<span class="arch-era">${arch.era}</span> — ${arch.description}${ruleHint}`;
  }
}

function initSetupScreen() {
  renderSetupSlots();
  document.getElementById("player-count").addEventListener("change", renderSetupSlots);
  document.getElementById("start-game-btn").addEventListener("click", startGame);
  const classicToggle = document.getElementById("classic-mode");
  if (classicToggle) classicToggle.addEventListener("change", renderSetupSlots);
  const persistToggle = document.getElementById("persist-enabled");
  if (persistToggle) {
    persistToggle.checked = Persist.isEnabled();
    persistToggle.addEventListener("change", () => {
      Persist.setEnabled(persistToggle.checked);
      renderSetupSlots();
    });
  }
  // Last game summary
  const lg = Persist.isEnabled() ? Persist.lastGame() : null;
  const lgEl = document.getElementById("last-game-summary");
  if (lgEl) {
    lgEl.innerHTML = lg ? `Last: <b>${lg.winner}</b> won — ${new Date(lg.timestamp).toLocaleDateString()}` : "";
  }
  // Saved-game load UI
  const loadBtn = document.getElementById("load-saved-btn");
  const savedSummary = document.getElementById("saved-game-summary");
  const info = SaveLoad.info();
  if (loadBtn) {
    if (info) {
      loadBtn.classList.remove("hidden");
      loadBtn.onclick = loadSavedGame;
    } else {
      loadBtn.classList.add("hidden");
    }
  }
  if (savedSummary) {
    savedSummary.innerHTML = info
      ? `Saved: turn ${info.turn} · ${info.phase} · ${new Date(info.savedAt).toLocaleString()}`
      : "";
  }
}

function loadSavedGame() {
  const data = SaveLoad.load();
  if (!data) { toast("No saved game found."); return; }
  state = data;
  midAttackResume = null;
  lastArmiesShown.clear();
  document.getElementById("setup-overlay").classList.add("hidden");
  document.getElementById("victory-root").innerHTML = "";
  document.getElementById("modal-root").innerHTML = "";
  document.getElementById("log-list").innerHTML = "";
  render();
  updateSaveInfo();
  toast("Game loaded.");
  scheduleIfAI();
}

function saveCurrentGame() {
  if (!state) { toast("No game in progress."); return; }
  const ok = SaveLoad.save(state);
  if (ok) {
    toast("Game saved.");
    updateSaveInfo();
  } else {
    toast("Cannot save right now.");
  }
}

function updateSaveInfo() {
  const el = document.getElementById("save-info");
  if (!el) return;
  const info = SaveLoad.info();
  el.textContent = info ? `Saved: ${new Date(info.savedAt).toLocaleTimeString()}` : "";
  const loadBtn = document.getElementById("load-game-btn");
